<html lang="vi">

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#FBF6F0;min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .3s ease}
input,select,button,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#E2D0BC;border-radius:3px}
.hidden{display:none!important}

/* Colors */
:root{
  --brown:#38261C;--brown-l:#5C3D2A;--brown-m:#7A5240;
  --green:#8FC643;--green-d:#6FA030;--green-l:#C5E08A;
  --cream:#FBF6F0;--cream-d:#F0E6D8;--cream-b:#E2D0BC;
  --white:#FFFFFF;--gray:#666666;
  --red:#C0392B;--orange:#D4851A;--blue:#2980B9;
}

/* Login Page */
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--white);border-radius:20px;padding:40px;width:100%;max-width:400px;
  box-shadow:0 10px 40px rgba(56,38,28,.12);text-align:center}
.login-logo{width:90px;height:90px;background:var(--brown);border-radius:50%;margin:0 auto 20px;
  display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--green)}
.login-title{font-size:22px;font-weight:900;color:var(--brown);margin-bottom:6px}
.login-subtitle{font-size:12px;color:var(--brown-m);margin-bottom:6px}
.login-slogan{font-size:11px;color:var(--green-d);font-style:italic;margin-bottom:30px}
.login-input{width:100%;padding:14px 16px;border:1px solid var(--cream-b);border-radius:12px;
  font-size:14px;margin-bottom:14px;transition:border .2s}
.login-input:focus{outline:none;border-color:var(--green)}
.login-btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--brown);
  color:var(--green);font-size:14px;font-weight:800;cursor:pointer;transition:all .2s}
.login-btn:hover{background:var(--brown-l);transform:translateY(-1px)}
.login-btn:disabled{opacity:.7;cursor:not-allowed}
.login-error{color:var(--red);font-size:12px;margin-bottom:14px;display:none}
.login-error.show{display:block}

/* Layout */
.layout{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--brown);display:flex;flex-direction:column;position:fixed;
  height:100vh;left:0;top:0;z-index:100}
.sidebar-header{padding:24px;text-align:center;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo{width:56px;height:56px;background:var(--green);border-radius:50%;margin:0 auto 12px;
  display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--brown)}
.sidebar-brand{font-size:15px;font-weight:800;color:var(--green)}
.sidebar-tagline{font-size:10px;color:rgba(255,255,255,.6);margin-top:4px}
.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;
  color:rgba(255,255,255,.7);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:4px;
  transition:all .2s}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:var(--green);color:var(--brown)}
.nav-item .icon{font-size:18px}
.sidebar-footer{padding:16px;border-top:1px solid rgba(255,255,255,.1)}
.lang-toggle{display:flex;background:rgba(255,255,255,.1);border-radius:8px;overflow:hidden}
.lang-btn{flex:1;padding:8px;border:none;background:transparent;color:rgba(255,255,255,.6);
  font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.lang-btn.active{background:var(--green);color:var(--brown)}

/* Main Content */
.main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--white);padding:16px 28px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--cream-b);position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:16px}
.page-title{font-size:18px;font-weight:800;color:var(--brown)}
.topbar-right{display:flex;align-items:center;gap:16px}
.user-info{display:flex;align-items:center;gap:12px}
.user-avatar{width:38px;height:38px;border-radius:50%;background:var(--green-l);
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--brown)}
.user-name{font-size:13px;font-weight:700;color:var(--brown)}
.user-role{font-size:11px;color:var(--brown-m)}
.logout-btn{padding:8px 16px;border:1px solid var(--cream-b);border-radius:10px;background:var(--white);
  color:var(--brown-m);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.logout-btn:hover{background:var(--red);color:#fff;border-color:var(--red)}

.content{flex:1;padding:28px}

/* KPI Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:var(--white);border-radius:16px;padding:20px;border:1px solid var(--cream-b);
  transition:all .2s}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(56,38,28,.08)}
.kpi-icon{font-size:28px;margin-bottom:12px}
.kpi-label{font-size:11px;font-weight:700;color:var(--brown-m);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:900;color:var(--brown)}
.kpi-sub{font-size:11px;color:var(--brown-m);margin-top:4px}
.kpi-badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;margin-left:8px}
.kpi-badge.up{background:#E8F5E9;color:#2E7D32}
.kpi-badge.down{background:#FFEBEE;color:#C62828}

/* Charts */
.charts-row{display:grid;gap:16px;margin-bottom:24px}
.charts-row.two{grid-template-columns:2fr 1fr}
.charts-row.half{grid-template-columns:1fr 1fr}
.chart-card{background:var(--white);border-radius:16px;padding:24px;border:1px solid var(--cream-b)}
.chart-title{font-size:14px;font-weight:800;color:var(--brown);margin-bottom:20px;
  display:flex;align-items:center;gap:8px}
.chart-container{position:relative;height:280px}

/* Top Sales */
.sales-list{display:flex;flex-direction:column;gap:12px}
.sales-item{display:flex;align-items:center;gap:12px}
.sales-rank{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800}
.sales-rank.gold{background:#FFD700;color:#5D4200}
.sales-rank.silver{background:#C0C0C0;color:#404040}
.sales-rank.bronze{background:#CD7F32;color:#fff}
.sales-rank.normal{background:var(--cream-d);color:var(--brown-m)}
.sales-info{flex:1}
.sales-name{font-size:13px;font-weight:700;color:var(--brown)}
.sales-bar{height:6px;background:var(--cream-d);border-radius:3px;margin-top:4px;overflow:hidden}
.sales-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.sales-kpi{font-size:13px;font-weight:800;min-width:50px;text-align:right}

/* Aging Bars */
.aging-bar{display:flex;height:32px;border-radius:8px;overflow:hidden;margin-bottom:12px}
.aging-segment{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.aging-legend{display:flex;flex-wrap:wrap;gap:12px}
.aging-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--brown-m)}
.aging-dot{width:10px;height:10px;border-radius:50%}



/* Welcome Card (for employees) */
.welcome-card{background:var(--white);border-radius:16px;padding:48px;text-align:center;
  border:1px solid var(--cream-b)}
.welcome-icon{font-size:56px;margin-bottom:20px}
.welcome-title{font-size:18px;font-weight:900;color:var(--brown);margin-bottom:10px}
.welcome-text{font-size:13px;color:var(--brown-m)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(56,38,28,.5);display:flex;
  align-items:center;justify-content:center;z-index:200}
.modal{background:var(--white);border-radius:20px;padding:28px;width:100%;max-width:380px;
  box-shadow:0 20px 60px rgba(56,38,28,.2)}
.modal-title{font-size:17px;font-weight:900;color:var(--brown);margin-bottom:20px}
.modal-input{width:100%;padding:12px 14px;border:1px solid var(--cream-b);border-radius:10px;
  font-size:14px;margin-bottom:12px}
.modal-input:focus{outline:none;border-color:var(--green)}
.modal-error{font-size:12px;color:var(--red);margin-bottom:12px}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.modal-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer}
.modal-btn.cancel{background:var(--cream-d);color:var(--brown-m);border:1px solid var(--cream-b)}
.modal-btn.primary{background:var(--brown);color:var(--green);border:none}

/* Alert Banner */
.alert-banner{background:#FFF4E6;border:1px solid #F5C842;border-radius:12px;padding:12px 18px;
  margin-bottom:20px;display:flex;align-items:center;gap:12px}
.alert-banner .icon{font-size:20px}
.alert-banner .text{flex:1;font-size:13px;font-weight:600;color:#8B5E00}
.alert-banner .btn{padding:7px 14px;border-radius:9px;border:none;background:var(--green);
  color:var(--brown);font-weight:800;font-size:12px;cursor:pointer}

/* Coming Soon */
.coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:300px;text-align:center}
.coming-soon .icon{font-size:56px;margin-bottom:20px}
.coming-soon .title{font-size:18px;font-weight:900;color:var(--brown);margin-bottom:10px}
.coming-soon .text{font-size:13px;color:var(--brown-m)}

/* Responsive */
@media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .charts-row.two,.charts-row.half{grid-template-columns:1fr}
}
@media(max-width:768px){
  .sidebar{width:200px}
  .main{margin-left:200px}
}
</style>
</head>

<script>

let state = {
  user: null,
  lang: 'vi',
  page: 'dashboard',
  charts: {}
};

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
const fmt = (n) => new Intl.NumberFormat('vi-VN').format(Math.round(n||0));
const fmtB = (n) => {
  if(n >= 1e9) return (n/1e9).toFixed(1) + ' tỷ';
  if(n >= 1e6) return (n/1e6).toFixed(0) + ' tr';
  return fmt(n);
};
const getInitials = (name) => name.split(' ').map(w=>w[0]).slice(-2).join('').toUpperCase();

// ══════════════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════════════
function _getAccountsForLogin() {
  try {
    const stored = localStorage.getItem('h5c_v1_accounts');
    if (stored) { const arr = JSON.parse(stored); if (arr && arr.length) return arr; }
  } catch(e) {}
  // Fallback: convert ACCOUNTS object to array format
  return Object.entries(ACCOUNTS).map(([email, v]) => ({
    email, pw: v.pw, role: v.user.role, name: v.user.name,
    pos: v.user.pos, empId: v.user.id
  }));
}

function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value;
  const errorEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  
  errorEl.classList.remove('show');

  // Try H5C accounts first, fallback to ACCOUNTS object
  const h5cAccounts = _getAccountsForLogin();
  const h5cAcc = h5cAccounts.find(a => a.email.toLowerCase() === email);
  if (h5cAcc && h5cAcc.pw === password) {
    const userObj = {id: h5cAcc.empId || h5cAcc.email, name: h5cAcc.name, role: h5cAcc.role, pos: h5cAcc.pos, email: h5cAcc.email};
    btn.textContent = 'Đang đăng nhập...'; btn.disabled = true;
    setTimeout(() => {
      state.user = userObj; saveSession(userObj); showMain();
      btn.textContent = 'Đăng nhập'; btn.disabled = false;
    }, 400);
    return;
  }

  // Fallback: old ACCOUNTS object
  const acc = ACCOUNTS[email] || ACCOUNTS[document.getElementById('loginEmail').value.trim()];
  if (!acc || acc.pw !== password) {
    errorEl.classList.add('show');
    return;
  }
  
  btn.textContent = 'Đang đăng nhập...';
  btn.disabled = true;
  
  setTimeout(() => {
    state.user = acc.user;
    saveSession(state.user);
    showMain();
    btn.textContent = 'Đăng nhập';
    btn.disabled = false;
  }, 400);
}

function handleLogout() {
  state.user = null;
  state.page = 'dashboard';
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('mainLayout').classList.add('hidden');

// === Granular Permission Engine v2 ===
const _PERM_VIEW_MAP={dashboard:'dash.view',orders:'orders.view',leads:'leads.view',expenses:'expenses.view',warehouse:'wh.view_stock',users:'users.view',reports:'reports.view',announcements:'ann.view'};
function _can(permId){
  try{
    const session=state.user; if(!session)return false;
    const accounts=JSON.parse(localStorage.getItem('h5c_v1_accounts')||'[]');
    const acc=accounts.find(a=>a.email===(session.email||''));
    if(!acc) return session.role==='C_LEVEL';
    if(acc.permissions){
      const val=acc.permissions[permId];
      return val===true||val==='all'||val==='own';
    }
    if(acc.role==='C_LEVEL') return true;
    return _roleDefault(acc.role,permId);
  }catch(e){return state.user&&state.user.role==='C_LEVEL';}
}
function _canScope(permId){
  try{
    const session=state.user; if(!session)return 'all';
    const accounts=JSON.parse(localStorage.getItem('h5c_v1_accounts')||'[]');
    const acc=accounts.find(a=>a.email===(session.email||''));
    if(!acc) return session.role==='C_LEVEL'?'all':'own';
    if(!acc.permissions){
      if(acc.role==='C_LEVEL'||acc.role==='MANAGER') return 'all';
      return 'own';
    }
    const val=acc.permissions[permId];
    if(val==='own') return 'own';
    if(val===true||val==='all') return 'all';
    return 'none';
  }catch(e){return 'all';}
}
function _roleDefault(role,pid){
  const S=['dash.view','dash.top_sales','orders.view','orders.view_detail','orders.view_commission','orders.view_history','orders.create','orders.edit','orders.update_progress','orders.request_cancel','orders.submit_request','leads.view','leads.view_detail','leads.view_stats','leads.create','leads.edit','leads.contact_log','leads.convert_order','ann.view'];
  const F=['dash.view','dash.kpi_finance','expenses.view','expenses.view_detail','expenses.view_charts','expenses.create','expenses.edit','expenses.mark_paid','reports.view','reports.generate','reports.compare','ann.view'];
  const H=['dash.view','users.view','users.view_salary','users.view_team','users.create','users.edit','users.attendance','users.kpi','ann.view','ann.create','ann.edit'];
  const M_DENY=['users.manage_accounts','users.manage_permissions','orders.commission_config','wh.commission_config'];
  if(role==='EMPLOYEE_SALES') return S.includes(pid);
  if(role==='EMPLOYEE_FINANCE') return F.includes(pid);
  if(role==='EMPLOYEE_HR') return H.includes(pid);
  if(role==='MANAGER') return !M_DENY.includes(pid);
  return false;
}
// === End Permission Engine ===

// ── Compute real KPIs from shared stores ──
function computeRealKPIs() {
  const orders    = H5C.get('orders')    || [];
  const expenses  = H5C.get('expenses')  || [];
  const employees = H5C.get('employees') || [];
  const leads     = H5C.get('leads')     || [];
  const lots      = H5C.get('lots')      || [];

  const activeOrders  = orders.filter(o => o.status !== 'cancelled');
  const revenue       = activeOrders.reduce((s,o) => s + (o.total||0), 0);
  const approvedExp   = expenses.filter(e => e.status !== 'tu_choi').reduce((s,e) => s + (e.amount||0), 0);
  const grossProfit   = Math.round(revenue * 0.42);
  const netProfit     = revenue - approvedExp;
  const pendingOrders = orders.filter(o => ['new','confirmed','producing','produced','shipping'].includes(o.status));
  const pendingValue  = pendingOrders.reduce((s,o) => s + (o.total||0), 0);
  const headcount     = employees.filter(e => e.status !== 'inactive').length;
  // AR = completed orders not fully paid
  const ar = orders.filter(o => o.status==='completed' && o.payment!=='paid')
    .reduce((s,o) => s + ((o.total||0) - (o.paidAmount||0)), 0);
  // AP = approved expenses not paid
  const ap = expenses.filter(e => e.status !== 'tu_choi' && e.payment !== 'da_thanh_toan' && e.payment !== 'paid')
    .reduce((s,e) => s + (e.amount||0), 0);
  const newLeads      = leads.filter(l => l.pipeline==='lead').length;
  const closedLeads   = leads.filter(l => ['chot_don','quay_lai'].includes(l.pipeline)).length;
  const convRate      = leads.length ? Math.round(closedLeads/leads.length*100) : 0;
  // Stock value from lots
  const skus = H5C.get('skus') || [];
  const stockValue = lots.reduce((s,lot) => {
    const sku = skus.find(x => x.id===lot.skuId);
    return s + (lot.qty||0) * (sku?sku.suggestedPrice||0:0);
  }, 0);

  const target = 3000000000;
  return {
    revenue:      { amount: revenue, target: target, vs_target_pct: target ? Math.round(revenue/target*100) : 0 },
    gross_profit: { amount: grossProfit, margin_pct: revenue ? Math.round(grossProfit/revenue*100) : 0 },
    net_profit:   { amount: netProfit },
    opex:         { amount: approvedExp },
    cash_flow:    { amount: Math.round(netProfit * 0.8) },
    ar:           { total: ar },
    ap:           { total: ap },
    orders:       { count: pendingOrders.length, value: pendingValue },
    headcount:    headcount,
    leads:        { count: newLeads, conversion_rate: convRate },
    stock_value:  stockValue,
  };
}

function _buildMonthlyData() {
  const orders   = (H5C.get('orders') || []).filter(o => o.status !== 'cancelled');
  const expenses = (H5C.get('expenses') || []).filter(e => e.status !== 'tu_choi');
  // Build last 12 months
  const months = [];
  const now = new Date();
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    const label = String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getFullYear()).slice(2);
    months.push({key, label, revenue:0, expense:0});
  }
  orders.forEach(o => {
    const dt = o.createdAt || o.date || '';
    if (!dt) return;
    const k = dt.slice(0,7); // "YYYY-MM"
    const m = months.find(x => x.key === k);
    if (m) m.revenue += (o.total || 0);
  });
  expenses.forEach(e => {
    const dt = e.date || '';
    if (!dt) return;
    const k = dt.slice(0,7);
    const m = months.find(x => x.key === k);
    if (m) m.expense += (e.amount || 0);
  });
  return months;
}

function renderAgingBars() {
  const orders   = H5C.get('orders')   || [];
  const expenses = H5C.get('expenses') || [];
  const now = new Date();

  // AR = completed orders not fully paid
  const arOrders = orders.filter(o => o.status==='completed' && o.payment!=='paid');
  const arBuckets = {'0_30':0,'31_60':0,'61_90':0,'over_90':0};
  arOrders.forEach(o => {
    const amt = (o.total||0) - (o.paidAmount||0);
    const days = Math.floor((now - new Date(o.createdAt || o.date || now)) / (1000*60*60*24));
    if (days <= 30) arBuckets['0_30'] += amt;
    else if (days <= 60) arBuckets['31_60'] += amt;
    else if (days <= 90) arBuckets['61_90'] += amt;
    else arBuckets['over_90'] += amt;
  });
  const arTotal = Object.values(arBuckets).reduce((a,b)=>a+b,0);

  // AP = approved expenses not paid
  const apExpenses = expenses.filter(e => e.status !== 'tu_choi' && e.payment !== 'paid' && e.payment !== 'da_thanh_toan');
  const apBuckets = {'0_30':0,'31_60':0,'61_90':0,'over_90':0};
  apExpenses.forEach(e => {
    const amt = e.amount || 0;
    const days = Math.floor((now - new Date(e.date || now)) / (1000*60*60*24));
    if (days <= 30) apBuckets['0_30'] += amt;
    else if (days <= 60) apBuckets['31_60'] += amt;
    else if (days <= 90) apBuckets['61_90'] += amt;
    else apBuckets['over_90'] += amt;
  });
  const apTotal = Object.values(apBuckets).reduce((a,b)=>a+b,0);

  // Always use real computed data
  const arData = {total:arTotal||0, '0_30':arBuckets['0_30'], '31_60':arBuckets['31_60'], '61_90':arBuckets['61_90'], 'over_90':arBuckets['over_90']};
  const apData = {total:apTotal||0, '0_30':apBuckets['0_30'], '31_60':apBuckets['31_60'], '61_90':apBuckets['61_90'], 'over_90':apBuckets['over_90']};

  const colors = {
    '0_30': '#8FC643',
    '31_60': '#D4851A', 
    '61_90': '#E74C3C',
    'over_90': '#8E44AD'
  };
  const labels = {
    '0_30': '0-30 ngày',
    '31_60': '31-60 ngày',
    '61_90': '61-90 ngày', 
    'over_90': '>90 ngày'
  };
  
  [{type:'ar', data:arData}, {type:'ap', data:apData}].forEach(({type, data}) => {
    const container = document.getElementById(type + 'Aging');
    if (!container) return;
    
    const total = data.total || 1;
    
    let barHtml = '<div class="aging-bar">';
    let legendHtml = '<div class="aging-legend">';
    
    ['0_30', '31_60', '61_90', 'over_90'].forEach(key => {
      const val = data[key] || 0;
      const pct = (val / total * 100).toFixed(1);
      barHtml += `<div class="aging-segment" style="width:${pct}%;background:${colors[key]}">${pct > 5 ? pct+'%' : ''}</div>`;
      legendHtml += `
        <div class="aging-legend-item">
          <div class="aging-dot" style="background:${colors[key]}"></div>
          ${labels[key]}: ${fmtB(val)}
        </div>
      `;
    });
    
    barHtml += '</div>';
    legendHtml += '</div>';
    
    container.innerHTML = barHtml + legendHtml;
  });
}

// PASSWORD MODAL
// ══════════════════════════════════════════════════════════════
function openPwdModal() {
  document.getElementById('pwdModal').classList.remove('hidden');
}

function closePwdModal() {
  document.getElementById('pwdModal').classList.add('hidden');
  document.getElementById('pwdCurrent').value = '';
  document.getElementById('pwdNew').value = '';
  document.getElementById('pwdConfirm').value = '';
  document.getElementById('pwdError').classList.add('hidden');
}

function changePwd() {
  const cur = document.getElementById('pwdCurrent').value;
  const newPwd = document.getElementById('pwdNew').value;
  const confirm = document.getElementById('pwdConfirm').value;
  const errorEl = document.getElementById('pwdError');
  
  if (!cur || !newPwd || !confirm) {
    errorEl.textContent = 'Vui lòng điền đầy đủ';
    errorEl.classList.remove('hidden');
    return;
  }
  
  if (newPwd !== confirm) {
    errorEl.textContent = state.lang === 'vi' ? 'Mật khẩu không khớp' : 'Passwords do not match';
    errorEl.classList.remove('hidden');
    return;
  }
  
  if (newPwd.length < 8) {
    errorEl.textContent = state.lang === 'vi' ? 'Ít nhất 8 ký tự' : 'Minimum 8 characters';
    errorEl.classList.remove('hidden');
    return;
  }
  
  // Simulate save
  setTimeout(() => {
    state.user.first = false;
    const alert = document.getElementById('firstLoginAlert');
    if (alert) alert.remove();
    closePwdModal();
  }, 500);
}

// ===== SHARED AUTH (sessionStorage) =====

// ═══════════════════════════════════════════════════════════
// H5C SHARED DATA STORE  (localStorage, prefix h5c_v1_)
// Keys: employees | attendance | kpi | skus | lots
//       orders | leads | expenses | announcements
//       pending_order  (leads → orders handoff)
// ═══════════════════════════════════════════════════════════
const H5C = {
  _k: k => 'h5c_v1_' + k,
  get(k)        { try { const v = localStorage.getItem(this._k(k)); return v ? JSON.parse(v) : null; } catch(e) { return null; } },
  set(k, v)     { try { localStorage.setItem(this._k(k), JSON.stringify(v)); } catch(e) {} },
  init(k, def)  { const v = this.get(k); if (v !== null) return v; this.set(k, def); return def; },
  clear(k)      { localStorage.removeItem(this._k(k)); },
  // Merge stored employees into a local array (for modules that read but don't own employees)
  mergeEmployees(arr) {
    const stored = this.get('employees');
    if (stored && stored.length) { arr.splice(0, arr.length, ...stored); }
  },
  // Get active employee names for sales dropdowns
  salesList() {
    const emps = this.get('employees') || [];
    const active = emps.filter(e => e.status !== 'inactive');
    return active.map(e => e.name);
  },
  // Get SKUs in PRODUCTS_LIST format for orders/leads
  productsList() {
    const skus = this.get('skus') || [];
    if (!skus.length) return null;
    const UNIT_MAP = {kg:'Kg',hop:'Hộp',chiec:'Chiếc',tui:'Túi',stick:'Stick',cont:'Cont'};
    return skus.map(s => ({
      id: s.id, name: s.name,
      unit: UNIT_MAP[s.unit] || s.unit || 'Cái',
      price: s.suggestedPrice || 0
    }));
  }
};

const SESSION_KEY = 'h5c_erp_user';

function saveSession(user) {
  localStorage.setItem(SESSION_KEY, JSON.stringify(user));
}

function loadSession() {
  try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch(e) { return null; }
}

function clearSession() {
  localStorage.removeItem(SESSION_KEY);
}



// Auto-login from session on page load
window.addEventListener('DOMContentLoaded', function() {
  const saved = loadSession();
  if (saved) {
    state.user = saved;
    showMain();
  }
});
