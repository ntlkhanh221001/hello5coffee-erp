.hidden{display:none!important}

.topbar{background:var(--white);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--cream-b);position:sticky;top:0;z-index:50}
.page-title{font-size:18px;font-weight:800;color:var(--brown)}
.topbar-right{display:flex;align-items:center;gap:16px}
.user-info{display:flex;align-items:center;gap:12px}
.user-avatar{width:38px;height:38px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--brown)}
.user-name{font-size:13px;font-weight:700;color:var(--brown)}

.content{flex:1;padding:28px}
.expense-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}

.stat-card.active{border-color:var(--green);box-shadow:0 0 0 2px var(--green-l)}
.stat-card.highlight{background:linear-gradient(135deg,var(--brown) 0%,var(--brown-l) 100%);border:none}

.stat-card.highlight .stat-label,.stat-card.highlight .stat-sub{color:rgba(255,255,255,.7)}
.stat-card.highlight .stat-value{color:var(--green)}
.stat-icon{font-size:28px}
.stat-info{flex:1}
.stat-label{font-size:11px;color:var(--brown-m);font-weight:600}
.stat-value{font-size:16px;font-weight:900;color:var(--brown)}
.stat-sub{font-size:11px;color:var(--brown-m);margin-top:2px}
.stat-sub.up{color:var(--green-d)}
.stat-sub.down{color:var(--red)}

.chart-section{background:var(--white);border-radius:16px;padding:20px;border:1px solid var(--cream-b);margin-bottom:24px}

.chart-title{font-size:14px;font-weight:800;color:var(--brown)}
.chart-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

.chart-container{position:relative;height:280px}
.expense-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.expense-filters{display:flex;gap:10px;flex-wrap:wrap}
.filter-select{padding:10px 14px;border:1px solid var(--cream-b);border-radius:10px;font-size:13px;background:var(--white);color:var(--brown);min-width:130px}

.filter-input{padding:10px 14px;border:1px solid var(--cream-b);border-radius:10px;font-size:13px;background:var(--white);color:var(--brown);min-width:160px}
.btn-add{padding:10px 20px;border:none;border-radius:10px;background:var(--green);color:var(--brown);font-size:13px;font-weight:800;cursor:pointer}

.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.modal-row.three{grid-template-columns:1fr 1fr 1fr}
.modal-group{margin-bottom:16px}
.modal-btns{display:flex;gap:10px;margin-top:24px}
.modal-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none}
.modal-btn.cancel{background:var(--cream-d);color:var(--brown-m)}

.active-filter-tag{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--green-l);border-radius:99px;font-size:12px;font-weight:600;color:var(--brown);margin-bottom:16px}

// === Granular Permission Engine v2 ===
const _PERM_VIEW_MAP={dashboard:'dash.view',orders:'orders.view',leads:'leads.view',expenses:'expenses.view',warehouse:'wh.view_stock',users:'users.view',reports:'reports.view',announcements:'ann.view'};
function _can(permId){
  try{
    const session=state.user; if(!session)return false;
    const accounts=JSON.parse(localStorage.getItem('h5c_v1_accounts')||'[]');
    const acc=accounts.find(a=>a.email===(session.email||''));
    if(!acc) return session.role==='C_LEVEL';
    if(acc.permissions){
      const val=acc.permissions[permId];
      return val===true||val==='all'||val==='own';
    }
    if(acc.role==='C_LEVEL') return true;
    return _roleDefault(acc.role,permId);
  }catch(e){return state.user&&state.user.role==='C_LEVEL';}
}
function _canScope(permId){
  try{
    const session=state.user; if(!session)return 'all';
    const accounts=JSON.parse(localStorage.getItem('h5c_v1_accounts')||'[]');
    const acc=accounts.find(a=>a.email===(session.email||''));
    if(!acc) return session.role==='C_LEVEL'?'all':'own';
    if(!acc.permissions){
      if(acc.role==='C_LEVEL'||acc.role==='MANAGER') return 'all';
      return 'own';
    }
    const val=acc.permissions[permId];
    if(val==='own') return 'own';
    if(val===true||val==='all') return 'all';
    return 'none';
  }catch(e){return 'all';}
}
function _roleDefault(role,pid){
  const S=['dash.view','dash.top_sales','orders.view','orders.view_detail','orders.view_commission','orders.view_history','orders.create','orders.edit','orders.update_progress','orders.request_cancel','orders.submit_request','leads.view','leads.view_detail','leads.view_stats','leads.create','leads.edit','leads.contact_log','leads.convert_order','ann.view'];
  const F=['dash.view','dash.kpi_finance','expenses.view','expenses.view_detail','expenses.view_charts','expenses.create','expenses.edit','expenses.mark_paid','reports.view','reports.generate','reports.compare','ann.view'];
  const H=['dash.view','users.view','users.view_salary','users.view_team','users.create','users.edit','users.attendance','users.kpi','ann.view','ann.create','ann.edit'];
  const M_DENY=['users.manage_accounts','users.manage_permissions','orders.commission_config','wh.commission_config'];
  if(role==='EMPLOYEE_SALES') return S.includes(pid);
  if(role==='EMPLOYEE_FINANCE') return F.includes(pid);
  if(role==='EMPLOYEE_HR') return H.includes(pid);
  if(role==='MANAGER') return !M_DENY.includes(pid);
  return false;
}
// === End Permission Engine ===

// Format số đầy đủ với dấu chấm
const fmt=(n)=>new Intl.NumberFormat('vi-VN').format(Math.round(n||0));
const getInitials=(name)=>name.split(' ').map(w=>w[0]).slice(-2).join('').toUpperCase();

// Format ngày DD/MM/YYYY
const formatDate=(d)=>{
  if(!d)return '—';
  const date=new Date(d);
  const dd=String(date.getDate()).padStart(2,'0');
  const mm=String(date.getMonth()+1).padStart(2,'0');
  const yyyy=date.getFullYear();
  return dd+'/'+mm+'/'+yyyy;
};

// Format tháng MM/YYYY
const formatMonth=(d)=>{
  const date=new Date(d+'-01');
  const mm=String(date.getMonth()+1).padStart(2,'0');
  const yyyy=date.getFullYear();
  return mm+'/'+yyyy;
};

const generateExpenseId=()=>'CP'+String(EXPENSES.length+1).padStart(3,'0');
const getCurrentMonth=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');};
const getLastMonth=()=>{const d=new Date();d.setMonth(d.getMonth()-1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');};

function populateMonthSelector(selectedMonth){
  const select=document.getElementById('chartMonth');
  if(!select)return;
  const months=[];
  const now=new Date();
  // 36 tháng: 12 tháng tương lai + 24 tháng quá khứ
  for(let i=-12;i<24;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const val=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const label=String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
    months.push({val,label});
  }
  select.innerHTML=months.map(m=>'<option value="'+m.val+'"'+(m.val===selectedMonth?' selected':'')+'>'+m.label+'</option>').join('');
}

function changeChartType(){state.chartType=document.getElementById('chartTypeSelect').value;updateChart();}

function updateChart(){
  const monthSelect=document.getElementById('chartMonth');
  let month=monthSelect?monthSelect.value:getCurrentMonth();
  
  // Override month based on active filter
  if(state.activeFilter==='thisMonth')month=getCurrentMonth();
  else if(state.activeFilter==='lastMonth')month=getLastMonth();
  
  let monthExp=EXPENSES.filter(e=>e.date.startsWith(month)&&e.status!=='tu_choi');
  
  // Apply status/payment filter for pending/unpaid
  if(state.activeFilter==='pending'){
    monthExp=EXPENSES.filter(e=>e.status==='cho_duyet');
  }else if(state.activeFilter==='unpaid'){
    monthExp=EXPENSES.filter(e=>e.payment==='chua_thanh_toan'&&e.status!=='tu_choi');
  }
  
  let data={},labels,colors;
  if(state.chartType==='category'){labels=CATEGORY_LABELS;colors=CATEGORY_COLORS;monthExp.forEach(e=>{data[e.category]=(data[e.category]||0)+e.amount;});}
  else if(state.chartType==='dept'){labels=DEPT_LABELS;colors=DEPT_COLORS;monthExp.forEach(e=>{data[e.dept]=(data[e.dept]||0)+e.amount;});}
  else{labels=EXPENSE_TYPE_LABELS;colors=EXPENSE_TYPE_COLORS;monthExp.forEach(e=>{data[e.expenseType]=(data[e.expenseType]||0)+e.amount;});}
  renderChart(data,labels,colors);
}

function renderChart(data,labelMap,colorMap){
  const ctx=document.getElementById('expenseChart');if(!ctx)return;
  if(state.charts.main)state.charts.main.destroy();
  const chartLabels=Object.keys(data).map(k=>labelMap[k]||k);
  const chartValues=Object.values(data);
  const chartColors=Object.keys(data).map(k=>colorMap[k]||'#757575');
  if(chartLabels.length===0){state.charts.main=new Chart(ctx,{type:'doughnut',data:{labels:['Không có dữ liệu'],datasets:[{data:[1],backgroundColor:['#E0E0E0']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});return;}
  state.charts.main=new Chart(ctx,{type:'doughnut',data:{labels:chartLabels,datasets:[{data:chartValues,backgroundColor:chartColors,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{position:'right',labels:{boxWidth:14,padding:12,font:{size:12}}}}}});
}

function renderExpenseTable(){
  const tbody=document.getElementById('expenseTableBody');
  const cm=getCurrentMonth(),lm=getLastMonth();
  
  const cf=document.getElementById('filterCategory').value;
  const df=document.getElementById('filterDept').value;
  const tf=document.getElementById('filterExpenseType').value;
  const sf=document.getElementById('filterStatus').value;
  const pf=document.getElementById('filterPayment').value;
  const search=document.getElementById('filterSearch').value.toLowerCase();
  
  const _expScope=_canScope('expenses.view');
  let filtered=(_expScope==='own')?EXPENSES.filter(e=>e.creator===state.user.name):EXPENSES;
  
  // Apply stat card filter
  if(state.activeFilter==='thisMonth'){
    filtered=filtered.filter(e=>e.date.startsWith(cm)&&e.status!=='tu_choi');
  }else if(state.activeFilter==='lastMonth'){
    filtered=filtered.filter(e=>e.date.startsWith(lm)&&e.status!=='tu_choi');
  }else if(state.activeFilter==='pending'){
    filtered=filtered.filter(e=>e.status==='cho_duyet');
  }else if(state.activeFilter==='unpaid'){
    filtered=filtered.filter(e=>e.payment==='chua_thanh_toan'&&e.status!=='tu_choi');
  }
  
  // Apply dropdown filters
  if(cf!=='all')filtered=filtered.filter(e=>e.category===cf);
  if(df!=='all')filtered=filtered.filter(e=>e.dept===df);
  if(tf!=='all')filtered=filtered.filter(e=>e.expenseType===tf);
  if(sf!=='all')filtered=filtered.filter(e=>e.status===sf);
  if(pf!=='all')filtered=filtered.filter(e=>e.payment===pf);
  if(search)filtered=filtered.filter(e=>e.desc.toLowerCase().includes(search));
  
  filtered.sort((a,b)=>new Date(b.date)-new Date(a.date));
  
  if(filtered.length===0){tbody.innerHTML='<tr><td colspan="11"><div class="empty-state"><div class="icon">📭</div><div class="title">Không có dữ liệu</div></div></td></tr>';return;}
  
  tbody.innerHTML=filtered.map(e=>{
    const fileIcon=e.file?((e.fileUrl||e.fileData)?'<span title="'+e.file+'" style="cursor:pointer" onclick="event.stopPropagation();viewExpense(\''+e.id+'\')">📎</span>':'<span title="'+e.file+' (chỉ tên)" style="color:var(--cream-b)">📄</span>'):'';
    return '<tr onclick="viewExpense(\''+e.id+'\')" style="cursor:pointer"><td>'+formatDate(e.date)+'</td><td><span class="expense-desc" title="'+e.desc+'">'+e.desc+'</span></td><td><span class="badge '+e.category+'">'+CATEGORY_LABELS[e.category]+'</span></td><td><span class="type-badge '+e.expenseType+'">'+EXPENSE_TYPE_LABELS[e.expenseType]+'</span></td><td><span class="dept-badge">'+DEPT_LABELS[e.dept]+'</span></td><td><span class="expense-amount">'+fmt(e.amount)+'đ</span></td><td><span class="status-badge '+e.status+'">'+STATUS_LABELS[e.status]+'</span></td><td><span class="payment-badge '+e.payment+'">'+PAYMENT_LABELS[e.payment]+'</span></td><td style="text-align:center">'+fileIcon+'</td><td>'+e.creator+'</td><td onclick="event.stopPropagation()"><div class="action-btns">'+(_can('expenses.edit')?'<button class="action-btn edit" onclick="editExpense(\''+e.id+'\')">✏️</button>':'')+''+(e.status==='cho_duyet'?(_can('expenses.approve')?'<button class="action-btn approve" onclick="openApproveModal(\''+e.id+'\')">✅</button>':''):'')+''+(_can('expenses.delete')?'<button class="action-btn delete" onclick="deleteExpense(\''+e.id+'\')">🗑️</button>':'')+'</div></td></tr>';
  }).join('');
}

function handleFileSelect(e){
  const f=e.target.files[0];
  if(!f)return;
  if(f.size>10*1024*1024){alert('File quá lớn (tối đa 10MB)');return;}
  
  state.selectedFile=f.name;
  state.selectedFileData=null;
  state._pendingFileObj=f; // giữ File object để upload khi save
  
  const sizeTxt=f.size>1024*1024?(f.size/1024/1024).toFixed(1)+'MB':Math.round(f.size/1024)+'KB';
  document.getElementById('filePreview').innerHTML='<div class="file-preview"><span class="file-preview-name">📎 '+f.name+' ('+sizeTxt+')</span><span class="file-preview-remove" onclick="removeFile()">✕</span></div>';
}
function removeFile(){state.selectedFile=null;state.selectedFileData=null;state._pendingFileObj=null;document.getElementById('filePreview').innerHTML='';document.getElementById('expenseFile').value='';}
function saveExpense(e){
  e.preventDefault();
  const id=document.getElementById('expenseId').value;
  const isEdit=!!id;
  const oldExpense=isEdit?EXPENSES.find(x=>x.id===id):null;
  
  const data={id:isEdit?id:generateExpenseId(),date:document.getElementById('expenseDate').value,amount:parseInt(document.getElementById('expenseAmount').value)||0,desc:document.getElementById('expenseDesc').value,category:document.getElementById('expenseCategory').value,dept:document.getElementById('expenseDept').value,expenseType:document.getElementById('expenseType').value,status:document.getElementById('expenseStatus').value,payment:document.getElementById('expensePayment').value,note:document.getElementById('expenseNote').value,file:state.selectedFile,fileUrl:oldExpense?oldExpense.fileUrl:null,filePath:oldExpense?oldExpense.filePath:null,fileData:null,creator:isEdit?oldExpense?.creator:state.user.name};
  
  // If there's a new file to upload
  if(state._pendingFileObj && window.H5CStorage && H5CStorage.ready){
    const btn=document.querySelector('#expenseForm .modal-btn.primary');
    if(btn){btn.textContent='⏳ Đang tải file...';btn.disabled=true;}
    
    H5CStorage.upload(state._pendingFileObj, 'expenses', (pct) => {
      if(btn) btn.textContent='⏳ Tải file... '+pct+'%';
    }).then(result => {
      data.fileUrl=result.url;
      data.filePath=result.path;
      data.file=result.name;
      _doSaveExpense(data, isEdit, id);
      if(btn){btn.textContent='💾 Lưu';btn.disabled=false;}
    }).catch(err => {
      console.warn('Upload failed, saving with base64 fallback:', err);
      // Fallback: đọc base64 nếu Storage lỗi
      const reader=new FileReader();
      reader.onload=function(ev){
        data.fileData=ev.target.result;
        _doSaveExpense(data, isEdit, id);
        if(btn){btn.textContent='💾 Lưu';btn.disabled=false;}
      };
      reader.readAsDataURL(state._pendingFileObj);
    });
  } else {
    // Giữ lại file cũ nếu không chọn file mới
    if(!state.selectedFile && oldExpense){
      data.file=null; data.fileUrl=null; data.filePath=null;
    } else if(state.selectedFile && !state._pendingFileObj && oldExpense){
      data.fileUrl=oldExpense.fileUrl;
      data.filePath=oldExpense.filePath;
      data.fileData=oldExpense.fileData;
    }
    _doSaveExpense(data, isEdit, id);
  }
}
function _doSaveExpense(data, isEdit, id){
  if(isEdit){const idx=EXPENSES.findIndex(x=>x.id===id);if(idx!==-1)EXPENSES[idx]=data;}else{EXPENSES.unshift(data);}
  H5C.set('expenses', EXPENSES);
  state._pendingFileObj=null;
  closeExpenseModal();renderExpenses();
}

function viewExpense(id){
  const e=EXPENSES.find(x=>x.id===id);if(!e)return;state.currentExpenseId=id;
  // Build file section
  let fileHtml='';
  if(e.file){
    const src = e.fileUrl || e.fileData || null;
    if(src){
      const isImage=/\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(e.file);
      const isPdf=/\.pdf$/i.test(e.file);
      fileHtml='<div class="detail-section"><div class="detail-title">📎 Đính kèm</div>';
      if(isImage){
        fileHtml+='<div style="margin-bottom:8px"><img src="'+src+'" style="max-width:100%;max-height:300px;border-radius:8px;border:1px solid var(--cream-b);cursor:pointer" onclick="window.open(this.src,\'_blank\')"></div>';
      }
      fileHtml+='<a href="'+src+'" download="'+e.file+'" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--green);color:var(--brown);border-radius:8px;font-size:12px;font-weight:700;text-decoration:none">⬇️ Tải '+e.file+'</a>';
      if(isPdf||isImage){
        fileHtml+=' <a href="'+src+'" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--cream-d);color:var(--brown);border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;margin-left:6px">👁 Xem</a>';
      }
      fileHtml+='</div>';
    }else{
      fileHtml='<div class="detail-section"><div class="detail-title">📎 Đính kèm</div><p style="font-size:12px;color:var(--brown-m)">📄 '+e.file+' <span style="color:var(--orange)">(file cũ — chỉ có tên)</span></p></div>';
    }
  }
  document.getElementById('expenseDetailContent').innerHTML='<div class="detail-section"><div class="detail-title">💵 Thông tin</div><div class="detail-grid"><div class="detail-item"><span class="detail-label">Mã</span><span class="detail-value">'+e.id+'</span></div><div class="detail-item"><span class="detail-label">Ngày</span><span class="detail-value">'+formatDate(e.date)+'</span></div><div class="detail-item" style="grid-column:span 2"><span class="detail-label">Mô tả</span><span class="detail-value">'+e.desc+'</span></div><div class="detail-item"><span class="detail-label">Số tiền</span><span class="detail-value" style="color:var(--red);font-weight:900">'+fmt(e.amount)+'đ</span></div><div class="detail-item"><span class="detail-label">Loại</span><span class="detail-value"><span class="type-badge '+e.expenseType+'">'+EXPENSE_TYPE_LABELS[e.expenseType]+'</span></span></div><div class="detail-item"><span class="detail-label">Nhóm</span><span class="detail-value"><span class="badge '+e.category+'">'+CATEGORY_LABELS[e.category]+'</span></span></div><div class="detail-item"><span class="detail-label">Phòng ban</span><span class="detail-value"><span class="dept-badge">'+DEPT_LABELS[e.dept]+'</span></span></div></div></div><div class="detail-section"><div class="detail-title">📋 Trạng thái</div><div class="detail-grid"><div class="detail-item"><span class="detail-label">Duyệt</span><span class="detail-value"><span class="status-badge '+e.status+'">'+STATUS_LABELS[e.status]+'</span></span></div><div class="detail-item"><span class="detail-label">Thanh toán</span><span class="detail-value"><span class="payment-badge '+e.payment+'">'+PAYMENT_LABELS[e.payment]+'</span></span></div></div></div>'+fileHtml+(e.note?'<div class="detail-section"><div class="detail-title">📝 Ghi chú</div><p>'+e.note+'</p></div>':'');
  document.getElementById('expenseDetailModal').classList.remove('hidden');
}
function closeExpenseDetailModal(){document.getElementById('expenseDetailModal').classList.add('hidden');}
function editFromDetail(){closeExpenseDetailModal();editExpense(state.currentExpenseId);}
function editExpense(id){openExpenseModal(id);}

function openApproveModal(id){const e=EXPENSES.find(x=>x.id===id);if(!e)return;state.currentExpenseId=id;document.getElementById('approveExpenseDesc').textContent=e.desc;document.getElementById('approveModal').classList.remove('hidden');}
function closeApproveModal(){document.getElementById('approveModal').classList.add('hidden');}
function approveExpense(){
  if(!_can('expenses.approve')){alert('Không có quyền duyệt');return;}const e=EXPENSES.find(x=>x.id===state.currentExpenseId);if(e)e.status='da_duyet';H5C.set('expenses',EXPENSES);closeApproveModal();renderExpenses();}
function rejectExpense(){
  if(!_can('expenses.reject')){alert('Không có quyền từ chối');return;}const e=EXPENSES.find(x=>x.id===state.currentExpenseId);if(e)e.status='tu_choi';H5C.set('expenses',EXPENSES);closeApproveModal();renderExpenses();}

function deleteExpense(id){state.currentExpenseId=id;document.getElementById('deleteModal').classList.remove('hidden');}
function closeDeleteModal(){document.getElementById('deleteModal').classList.add('hidden');}
function confirmDelete(){const idx=EXPENSES.findIndex(x=>x.id===state.currentExpenseId);if(idx!==-1)EXPENSES.splice(idx,1);H5C.set('expenses',EXPENSES);closeDeleteModal();renderExpenses();}

document.addEventListener('DOMContentLoaded',()=>{document.getElementById('loginPassword').addEventListener('keypress',e=>{if(e.key==='Enter')handleLogin();});});

// ===== SHARED AUTH (sessionStorage) =====

// ═══════════════════════════════════════════════════════════
// H5C SHARED DATA STORE  (localStorage, prefix h5c_v1_)
// Keys: employees | attendance | kpi | skus | lots
//       orders | leads | expenses | announcements
//       pending_order  (leads → orders handoff)
// ═══════════════════════════════════════════════════════════
const H5C = {
  _k: k => 'h5c_v1_' + k,
  get(k)        { try { const v = localStorage.getItem(this._k(k)); return v ? JSON.parse(v) : null; } catch(e) { return null; } },
  set(k, v)     { try { localStorage.setItem(this._k(k), JSON.stringify(v)); } catch(e) {} },
  init(k, def)  { const v = this.get(k); if (v !== null) return v; this.set(k, def); return def; },
  clear(k)      { localStorage.removeItem(this._k(k)); },
  // Merge stored employees into a local array (for modules that read but don't own employees)
  mergeEmployees(arr) {
    const stored = this.get('employees');
    if (stored && stored.length) { arr.splice(0, arr.length, ...stored); }
  },
  // Get active employee names for sales dropdowns
  salesList() {
    const emps = this.get('employees') || [];
    const active = emps.filter(e => e.status !== 'inactive');
    return active.map(e => e.name);
  },
  // Get SKUs in PRODUCTS_LIST format for orders/leads
  productsList() {
    const skus = this.get('skus') || [];
    if (!skus.length) return null;
    const UNIT_MAP = {kg:'Kg',hop:'Hộp',chiec:'Chiếc',tui:'Túi',stick:'Stick',cont:'Cont'};
    return skus.map(s => ({
      id: s.id, name: s.name,
      unit: UNIT_MAP[s.unit] || s.unit || 'Cái',
      price: s.suggestedPrice || 0
    }));
  }
};
// ═══════════════════════════════════════════════════════════

const SESSION_KEY = 'h5c_erp_user';

function saveSession(user) {
  localStorage.setItem(SESSION_KEY, JSON.stringify(user));
}

function loadSession() {
  try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch(e) { return null; }
}

function clearSession() {
  localStorage.removeItem(SESSION_KEY);
}

function navigateTo(p) {
  const pageMap = {
    dashboard: 'dashboard.html',
    leads: 'leads.html',
    orders: 'orders.html',
    expenses: 'expenses.html',
    warehouse: 'warehouse.html',
    users: 'users.html',
    reports: 'reports.html',
    announcements: 'announcements.html',
  };
  if (pageMap[p]) {
    window.location.href = pageMap[p];
  } else {
    alert('Module "' + p + '" đang được phát triển!');
  }
}

// Auto-login from session on page load
window.addEventListener('DOMContentLoaded', function() {
EXPENSES = H5C.init('expenses', EXPENSES);
    const saved = loadSession();
  if (saved) {
    state.user = saved;
    showMain();
  }
});
// ===== END SHARED AUTH =====
