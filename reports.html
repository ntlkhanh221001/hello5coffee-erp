<style>/* Reports page-specific overrides */
.builder-wrap{display:grid;grid-template-columns:320px 1fr;gap:20px}

.section-title{font-size:13px;font-weight:800;color:var(--h5c-text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.module-btn{width:100%;padding:10px 12px;border:1px solid var(--h5c-border);border-radius:var(--h5c-radius-sm);background:var(--h5c-surface);font-size:11px;font-weight:600;cursor:pointer;text-align:left;margin-bottom:6px;display:flex;align-items:center;gap:8px;transition:all var(--h5c-duration) var(--h5c-ease);color:var(--h5c-text)}
.module-btn:hover{border-color:var(--h5c-copper)}
.module-btn.active{background:var(--h5c-copper-light);border-color:var(--h5c-copper)}
.module-btn .icon{font-size:16px}
.checkbox-group{padding:8px 0 8px 28px;display:none}
.checkbox-group.show{display:block}
.checkbox-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:11px;color:var(--h5c-text)}
.checkbox-item input{width:14px;height:14px;cursor:pointer;accent-color:var(--h5c-copper)}
.checkbox-item label{cursor:pointer}
.time-section{margin-top:16px;padding-top:16px;border-top:1px solid var(--h5c-border)}
.time-row{display:grid;grid-template-columns:1fr 16px 1fr;align-items:center;gap:4px;margin-bottom:8px}
.time-input{width:100%;padding:8px 4px;border:1px solid var(--h5c-border);border-radius:var(--h5c-radius-sm);font-size:11px;text-align:center;background:var(--h5c-bg);color:var(--h5c-text);transition:border-color var(--h5c-duration) var(--h5c-ease)}
.time-input:focus{border-color:var(--h5c-copper);outline:none;box-shadow:var(--h5c-shadow-glow)}
.compare-toggle{display:flex;align-items:center;gap:8px;padding:10px;background:var(--h5c-bg);border-radius:var(--h5c-radius-sm);margin-top:12px;font-size:11px;color:var(--h5c-text)}
.compare-toggle input{width:16px;height:16px;accent-color:var(--h5c-copper)}
.compare-dates{margin-top:8px;display:none}
.compare-dates.show{display:block}
.btn-generate{width:100%;padding:12px;border:none;border-radius:var(--h5c-radius-sm);background:linear-gradient(135deg, var(--h5c-espresso), #2A1C14);color:var(--h5c-copper);font-size:12px;font-weight:700;cursor:pointer;margin-top:16px;transition:all var(--h5c-duration) var(--h5c-ease);letter-spacing:0.02em}
.btn-generate:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(56,38,28,0.2)}
.btn-export{padding:8px 16px;border:1px solid var(--h5c-border);border-radius:var(--h5c-radius-sm);background:var(--h5c-surface);font-size:11px;font-weight:600;cursor:pointer;margin-left:8px;color:var(--h5c-text-secondary);transition:all var(--h5c-duration) var(--h5c-ease)}
.btn-export:hover{background:var(--h5c-bg-subtle);border-color:var(--h5c-copper)}
.report-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:400px;color:var(--h5c-text-muted)}
.report-placeholder .icon{font-size:48px;margin-bottom:12px}
.report-content{display:none}
.report-content.show{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat-box{background:var(--h5c-surface);border-radius:var(--h5c-radius-md);padding:18px 16px;text-align:center;border:1px solid var(--h5c-border-subtle);box-shadow:var(--h5c-shadow-sm);position:relative;overflow:hidden;transition:box-shadow var(--h5c-duration) var(--h5c-ease)}

// === Granular Permission Engine v2 ===
const _PERM_VIEW_MAP={dashboard:'dash.view',orders:'orders.view',leads:'leads.view',expenses:'expenses.view',warehouse:'wh.view_stock',users:'users.view',reports:'reports.view',announcements:'ann.view'};
function _can(permId){
  try{
    const session=state.user; if(!session)return false;
    const accounts=JSON.parse(localStorage.getItem('h5c_v1_accounts')||'[]');
    const acc=accounts.find(a=>a.email===(session.email||''));
    if(!acc) return session.role==='C_LEVEL';
    if(acc.permissions){
      const val=acc.permissions[permId];
      return val===true||val==='all'||val==='own';
    }
    if(acc.role==='C_LEVEL') return true;
    return _roleDefault(acc.role,permId);
  }catch(e){return state.user&&state.user.role==='C_LEVEL';}
}
function _canScope(permId){
  try{
    const session=state.user; if(!session)return 'all';
    const accounts=JSON.parse(localStorage.getItem('h5c_v1_accounts')||'[]');
    const acc=accounts.find(a=>a.email===(session.email||''));
    if(!acc) return session.role==='C_LEVEL'?'all':'own';
    if(!acc.permissions){
      if(acc.role==='C_LEVEL'||acc.role==='MANAGER') return 'all';
      return 'own';
    }
    const val=acc.permissions[permId];
    if(val==='own') return 'own';
    if(val===true||val==='all') return 'all';
    return 'none';
  }catch(e){return 'all';}
}

function fmtSmart(n,format){
  if(format==='pct') return (n||0)+'%';
  if(format!=='money') return fmt(n);
  const v=Math.abs(n||0);
  if(v>=1e9) return (n/1e9).toLocaleString('vi-VN',{maximumFractionDigits:2})+' tỷ';

}

const PIPELINE_LABELS={lead:'Lead mới',bao_gia:'Báo giá',gui_sample:'Gửi sample',deal:'Deal',chot_don:'Chốt đơn đầu',quay_lai:'Quay lại'};
const CHANNEL_LABELS={facebook:'Facebook',instagram:'Instagram',linkedin:'LinkedIn',website:'Website',shopee:'Shopee',lazada:'Lazada',tiktok:'TikTok',telesales:'Telesales',truc_tiep:'Trực tiếp',duoc_gioi_thieu:'Được giới thiệu',hoi_cho:'Hội chợ/Triển lãm',google_ads:'Google Ads',email:'Email Marketing',zalo:'Zalo',chua_ro:'Chưa rõ',buon:'Buôn',buon_si:'Buôn',le:'Lẻ'};
const ORDER_STATUS_LABELS={new:'Mới',confirmed:'Xác nhận',producing:'Đang SX',produced:'SX xong',shipping:'Đang giao',completed:'Hoàn thành',cancelled:'Đã hủy'};
const EXPENSE_CAT_LABELS={luong:'Lương',nguyen_lieu:'Nguyên liệu',van_hanh:'Vận hành',marketing:'Marketing',logistics:'Logistics',khac:'Khác'};
const EXPENSE_TYPE_LABELS={dinh_phi:'Định phí',bien_phi:'Biến phí'};
const COUNTRY_LABELS={vietnam:'Việt Nam',japan:'Nhật Bản',korea:'Hàn Quốc',china:'Trung Quốc',taiwan:'Đài Loan',singapore:'Singapore',thailand:'Thái Lan',malaysia:'Malaysia',usa:'Mỹ',uk:'Anh',france:'Pháp',germany:'Đức',australia:'Úc',uae:'UAE',other:'Khác'};

const MODULE_PERM={orders:'orders.view',leads:'leads.view',expenses:'expenses.view',warehouse:'wh.view_stock',users:'users.view'};

function getReportData(module, dateFrom, dateTo) {
  const from = dateFrom ? new Date(dateFrom) : new Date('2000-01-01');
  const to   = dateTo   ? new Date(dateTo)   : new Date('2099-12-31');
  const inRange = d => { if(!d) return true; const dt=new Date(d); return dt>=from && dt<=to; };

  const orders    = (H5C.get('orders')   ||[]).filter(o => o.status!=='cancelled' && inRange(o.createdAt));
  const leads     = (H5C.get('leads')    ||[]).filter(l => inRange(l.startDate));
  const expenses  = (H5C.get('expenses') ||[]).filter(e => e.status!=='tu_choi' && inRange(e.date));
  const employees = H5C.get('employees') ||[];
  const lots      = H5C.get('lots')      ||[];
  const skus      = H5C.get('skus')      ||[];

  if (module === 'orders') {
    const rev = orders.reduce((s,o)=>s+(o.total||0),0);
    const byStatus = {};
    orders.forEach(o => { const lbl=ORDER_STATUS_LABELS[o.status]||o.status||'Khác'; byStatus[lbl]=(byStatus[lbl]||0)+1; });
    const byChannel = {};
    orders.forEach(o => { const ch=CHANNEL_LABELS[o.channel]||o.channel||'Khác'; byChannel[ch]=(byChannel[ch]||0)+(o.total||0); });
    const prodMap = {};
    orders.forEach(o => (o.products||[]).forEach(p => {
      if(!prodMap[p.name]) prodMap[p.name]={name:p.name,qty:0,revenue:0};
      prodMap[p.name].qty += p.qty||0;
      prodMap[p.name].revenue += (p.qty||0)*(p.unitPrice||0);
    }));
    const topProducts = Object.values(prodMap).sort((a,b)=>b.revenue-a.revenue).slice(0,5);
    const custMap = {};
    orders.forEach(o => {
      if(!custMap[o.customer]) custMap[o.customer]={name:o.customer,value:0};
      custMap[o.customer].value += o.total||0;
    });
    const topCustomers = Object.values(custMap).sort((a,b)=>b.value-a.value).slice(0,5);
    return { total:orders.length, revenue:rev, avg:orders.length?Math.round(rev/orders.length):0,
      byStatus:{labels:Object.keys(byStatus),data:Object.values(byStatus)},
      byChannel:{labels:Object.keys(byChannel),data:Object.values(byChannel)},
      topProducts, topCustomers };
  }
  if (module === 'leads') {
    const closed = leads.filter(l=>l.pipeline==='chot_don').length;
    const conv = leads.length?Math.round(closed/leads.length*100):0;
    const bySource = {}; leads.forEach(l=>{const ch=CHANNEL_LABELS[l.channel]||l.channel||'Khác';bySource[ch]=(bySource[ch]||0)+1;});
    const byStatus = {}; leads.forEach(l=>{const st=PIPELINE_LABELS[l.pipeline]||l.pipeline||'Khác';byStatus[st]=(byStatus[st]||0)+1;});
    const byStaff  = {}; leads.forEach(l=>{const s=l.sales||l.assignedTo||'Chưa gán';byStaff[s]=(byStaff[s]||0)+1;});
    const byCountry= {}; leads.forEach(l=>{const c=COUNTRY_LABELS[l.country]||l.countryLabel||l.country||'Chưa rõ';byCountry[c]=(byCountry[c]||0)+1;});
    const byProductMap={}; leads.forEach(l=>{(l.interestedProducts||[]).forEach(p=>{const n=p.name||p.productId||'Khác';byProductMap[n]=(byProductMap[n]||0)+1;});});
    const topByProduct=Object.entries(byProductMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
    const totalValue = leads.reduce((s,l)=>s+(l.estimatedValue||0),0);
    return {total:leads.length, converted:closed, conversionRate:conv, totalValue,
      bySource:{labels:Object.keys(bySource),data:Object.values(bySource)},
      byStatus:{labels:Object.keys(byStatus),data:Object.values(byStatus)},
      byStaff:{labels:Object.keys(byStaff),data:Object.values(byStaff)},
      byCountry:{labels:Object.keys(byCountry),data:Object.values(byCountry)},
      byProduct:{labels:topByProduct.map(x=>x[0]),data:topByProduct.map(x=>x[1])}};
  }
  if (module === 'expenses') {
    const total = expenses.reduce((s,e)=>s+(e.amount||0),0);
    const byCat = {}; expenses.forEach(e=>{const c=EXPENSE_CAT_LABELS[e.category]||e.category||'Khác';byCat[c]=(byCat[c]||0)+(e.amount||0);});
    const byDept= {}; expenses.forEach(e=>{const d=e.dept||'Khác';byDept[d]=(byDept[d]||0)+(e.amount||0);});
    const byPayment={}; expenses.forEach(e=>{const pm=e.payment==='da_thanh_toan'?'Đã thanh toán':e.payment==='mot_phan'?'Một phần':'Chưa TT';byPayment[pm]=(byPayment[pm]||0)+(e.amount||0);});
    const byType={}; expenses.forEach(e=>{const t=EXPENSE_TYPE_LABELS[e.expenseType]||e.expenseType||'Biến phí';byType[t]=(byType[t]||0)+(e.amount||0);});
    return {total, byCategory:{labels:Object.keys(byCat),data:Object.values(byCat)},
      byDept:{labels:Object.keys(byDept),data:Object.values(byDept)},
      byPayment:{labels:Object.keys(byPayment),data:Object.values(byPayment)},
      byType:{labels:Object.keys(byType),data:Object.values(byType)} };
  }
  if (module === 'warehouse') {
    const stockQty   = lots.reduce((s,l)=>s+(l.qty||0),0);
    const stockValue = lots.reduce((s,l)=>{const sk=skus.find(x=>x.id===l.skuId);return s+(l.qty||0)*(sk?sk.suggestedPrice||0:0);},0);
    const byType={}; skus.forEach(sk=>{
      const totalQty=lots.filter(l=>l.skuId===sk.id).reduce((s,l)=>s+(l.qty||0),0);
      if(totalQty>0) byType[sk.type||sk.category||'Khác']=(byType[sk.type||sk.category||'Khác']||0)+totalQty;
    });
    const _warehouses=H5C.get('warehouses')||[];
    const byWarehouse={}; lots.forEach(l=>{
      const wRec=_warehouses.find(w=>w.id===l.warehouseId);
      const wh=wRec?wRec.name:(l.warehouseId||l.warehouse||l.location||'Kho chính');
      byWarehouse[wh]=(byWarehouse[wh]||0)+(l.qty||0);
    });
    const imported = lots.filter(l=>l.type==='nhap'&&inRange(l.date||l.createdAt)).reduce((s,l)=>s+(l.qty||0),0);
    const exported = lots.filter(l=>l.type==='xuat'&&inRange(l.date||l.createdAt)).reduce((s,l)=>s+Math.abs(l.qty||0),0);
    const expiring = lots.filter(l=>{if(!l.bestBefore)return false;const d=new Date(l.bestBefore);const diff=(d-new Date())/(1000*60*60*24);return diff>=0&&diff<=30;}).length;
    const lowStock = skus.filter(sk=>{const qty=lots.filter(l=>l.skuId===sk.id).reduce((s,l)=>s+(l.qty||0),0);return qty>0&&qty<=(sk.minStock||0);}).length;
    return {stockQty,stockValue,imported,exported,expiring,lowStock,
      byType:{labels:Object.keys(byType),data:Object.values(byType)},
      byWarehouse:{labels:Object.keys(byWarehouse),data:Object.values(byWarehouse)} };
  }
  if (module === 'users') {
    const working=employees.filter(e=>e.status!=='inactive');
    const kpiData=H5C.get('kpi')||[];
    const kpiAvg=kpiData.length?Math.round(kpiData.reduce((s,k)=>s+(k.scores||[]).reduce((a,b)=>a+b,0)/(k.scores.length||1),0)/kpiData.length):0;
    const byDept={}; working.forEach(e=>{const d=e.dept||'Khác';byDept[d]=(byDept[d]||0)+1;});
    const byStatus={}; working.forEach(e=>{
      const sl={active:'Chính thức',probation:'Thử việc',handover:'Đang bàn giao'};
      const label=sl[e.status]||e.status;
      byStatus[label]=(byStatus[label]||0)+1;
    });
    // Attendance stats from real data
    const attendance = H5C.get('attendance') || [];
    const attInRange = attendance.filter(a => inRange(a.date));
    const totalAtt = attInRange.length || 1;
    const checkedIn = attInRange.filter(a=>['checked_in','outside'].includes(a.status)).length;
    const late = attInRange.filter(a=>a.status==='late').length;
    const attendanceRate = Math.round((checkedIn+late)/totalAtt*100);
    const lateRate = Math.round(late/totalAtt*100);
    // KPI distribution
    const exceed=kpiData.filter(k=>{const avg=(k.scores||[]).reduce((a,b)=>a+b,0)/(k.scores.length||1);return avg>100;}).length;
    const met=kpiData.filter(k=>{const avg=(k.scores||[]).reduce((a,b)=>a+b,0)/(k.scores.length||1);return avg>=90&&avg<=100;}).length;
    const below=kpiData.filter(k=>{const avg=(k.scores||[]).reduce((a,b)=>a+b,0)/(k.scores.length||1);return avg<90;}).length;
    return {total:working.length,kpiAvg,attendanceRate,lateRate,
      byDept:{labels:Object.keys(byDept),data:Object.values(byDept)},
      byStatus:{labels:Object.keys(byStatus),data:Object.values(byStatus)},
      kpiRate:{labels:['Vượt KPI','Đạt KPI','Chưa đạt'],data:[exceed,met,below]}
    };
  }
  return null;
}

function toggleMetric(id){if(state.selectedMetrics.includes(id)){state.selectedMetrics=state.selectedMetrics.filter(m=>m!==id);}else{state.selectedMetrics.push(id);}}
// ── Date helpers ──
function _rptD(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`;}
function _rptIso(str){
  if(!str)return null;
  const p=str.replace(/-/g,'/').split('/');if(p.length!==3)return null;
  let[d,m,y]=p.map(s=>s.trim());
  if(d.length===4)[d,m,y]=[y,m,d];
  if(!y||y.length<4)return null;
  const iso=`${y.padStart(4,'0')}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  return isNaN(new Date(iso).getTime())?null:iso;
}
function _rptSetFrom(v){const iso=_rptIso(v);if(iso){state.dateFrom=iso;}else{const el=document.getElementById('rptFrom');if(el)el.value=_rptD(state.dateFrom);}}
function _rptSetTo(v){const iso=_rptIso(v);if(iso){state.dateTo=iso;}else{const el=document.getElementById('rptTo');if(el)el.value=_rptD(state.dateTo);}}
function _rptSetCmpFrom(v){const iso=_rptIso(v);if(iso){state.compareDateFrom=iso;}else{const el=document.getElementById('rptCmpFrom');if(el)el.value=_rptD(state.compareDateFrom);}}
function _rptSetCmpTo(v){const iso=_rptIso(v);if(iso){state.compareDateTo=iso;}else{const el=document.getElementById('rptCmpTo');if(el)el.value=_rptD(state.compareDateTo);}}

function renderReport(){
  const area=document.getElementById('reportArea');
  const metrics=state.selectedMetrics;
  const compare=state.compare;

  // ── Determine which modules are needed ──
  const moduleForMetric = id => {
    if(id.startsWith('order_'))return 'orders';
    if(id.startsWith('lead_'))return 'leads';
    if(id.startsWith('expense_'))return 'expenses';
    if(id.startsWith('wh_'))return 'warehouse';
    if(id.startsWith('user_'))return 'users';
    if(id.startsWith('task_'))return 'tasks';
    return null;
  };
  const neededModules = [...new Set(metrics.map(moduleForMetric).filter(Boolean))];

  // ── Build current period data ──
  const cur = {};
  neededModules.forEach(m => {
    if (m === 'tasks') { cur[m] = REPORT_DATA[m] || {}; return; } // tasks has no H5C store yet
    const realData = getReportData(m, state.dateFrom, state.dateTo);
    cur[m] = realData || {};
  });

  // ── Build comparison period data ──
  const prev = {};
  if (compare) {
    neededModules.forEach(m => {
      if (m === 'tasks') { prev[m] = PREV_DATA[m] || {}; return; }
      const realPrev = getReportData(m, state.compareDateFrom, state.compareDateTo);
      prev[m] = realPrev || {};
    });
  } else {
    neededModules.forEach(m => { prev[m] = {}; });
  }

  // Data accessors: real data only, 0 if missing
  const v = (mod, field) => {
    const real = cur[mod] ? cur[mod][field] : undefined;
    return (real !== undefined && real !== null) ? real : 0;
  };
  const pv = (mod, field) => {
    const real = prev[mod] ? prev[mod][field] : undefined;
    return (real !== undefined && real !== null) ? real : 0;
  };
  const vc = (mod, field) => {
    const real = cur[mod] ? cur[mod][field] : undefined;
    if (real && real.labels && real.labels.length > 0) return real;
    return {labels:[],data:[]};
  };
  const pvc = (mod, field) => {
    const real = prev[mod] ? prev[mod][field] : undefined;
    if (real && real.labels && real.labels.length > 0) return real;
    return {labels:[],data:[]};
  };

  const _modLabels={orders:'Đơn hàng',leads:'Lead/CRM',expenses:'Chi phí',warehouse:'Kho hàng',users:'Nhân sự',tasks:'Công việc'};
  const _fmtDate=d=>{if(!d)return'';const[y,m,dd]=d.split('-');return dd+'/'+m+'/'+y;};
  let h='<div class="report-content show">';
  h+='<div class="report-header-bar">';
  h+='<div><div class="report-header-title">📊 Kết quả báo cáo</div>';
  h+='<div class="report-header-meta">Kỳ: '+_fmtDate(state.dateFrom)+' → '+_fmtDate(state.dateTo);
  if(compare) h+=' &nbsp;|&nbsp; So sánh: '+_fmtDate(state.compareDateFrom)+' → '+_fmtDate(state.compareDateTo);
  h+='</div></div>';
  h+='<div style="display:flex;align-items:center;gap:10px">';
  if(compare) h+='<div style="display:flex;gap:12px"><div class="legend-item" style="color:rgba(255,255,255,0.8)"><div class="legend-color" style="background:var(--h5c-copper)"></div>Kỳ hiện tại</div><div class="legend-item" style="color:rgba(255,255,255,0.5)"><div class="legend-color" style="background:#9C8B7E"></div>Kỳ trước</div></div>';
  h+='<button class="btn-export" onclick="exportReport()" style="color:var(--h5c-copper);border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.08)">📥 Xuất CSV</button>';
  h+='</div></div>';

  // Stats
  let stats=[];
  if(metrics.includes('order_total'))stats.push({label:'Tổng đơn hàng',value:v('orders','total'),prev:pv('orders','total')});
  if(metrics.includes('order_revenue'))stats.push({label:'Doanh thu',value:v('orders','revenue'),prev:pv('orders','revenue'),format:'money'});
  if(metrics.includes('order_avg'))stats.push({label:'Giá trị TB',value:v('orders','avg'),prev:pv('orders','avg'),format:'money'});
  if(metrics.includes('lead_total'))stats.push({label:'Tổng lead',value:v('leads','total'),prev:pv('leads','total')});
  if(metrics.includes('lead_conversion'))stats.push({label:'Tỷ lệ chuyển đổi',value:v('leads','conversionRate'),prev:pv('leads','conversionRate'),format:'pct'});
  if(metrics.includes('lead_value'))stats.push({label:'Giá trị tiềm năng',value:v('leads','totalValue'),prev:pv('leads','totalValue'),format:'money'});
  if(metrics.includes('expense_total'))stats.push({label:'Tổng chi phí',value:v('expenses','total'),prev:pv('expenses','total'),format:'money',inverse:true});
  if(metrics.includes('wh_stock_qty'))stats.push({label:'Tồn kho (SL)',value:v('warehouse','stockQty'),prev:pv('warehouse','stockQty')});
  if(metrics.includes('wh_stock_value'))stats.push({label:'Giá trị tồn',value:v('warehouse','stockValue'),prev:pv('warehouse','stockValue'),format:'money'});
  if(metrics.includes('wh_import'))stats.push({label:'Số lượng nhập',value:v('warehouse','imported'),prev:pv('warehouse','imported')});
  if(metrics.includes('wh_export'))stats.push({label:'Số lượng xuất',value:v('warehouse','exported'),prev:pv('warehouse','exported')});
  if(metrics.includes('wh_expiring'))stats.push({label:'Lô sắp hết hạn',value:v('warehouse','expiring'),prev:pv('warehouse','expiring'),inverse:true});
  if(metrics.includes('wh_low_stock'))stats.push({label:'SP sắp hết hàng',value:v('warehouse','lowStock'),prev:pv('warehouse','lowStock'),inverse:true});
  if(metrics.includes('user_total'))stats.push({label:'Tổng NV',value:v('users','total'),prev:pv('users','total')});
  if(metrics.includes('user_attendance'))stats.push({label:'Tỷ lệ chấm công',value:v('users','attendanceRate'),prev:pv('users','attendanceRate'),format:'pct'});
  if(metrics.includes('user_late'))stats.push({label:'Tỷ lệ đi muộn',value:v('users','lateRate'),prev:pv('users','lateRate'),format:'pct',inverse:true});
  if(metrics.includes('user_kpi_avg'))stats.push({label:'KPI TB',value:v('users','kpiAvg'),prev:pv('users','kpiAvg'),format:'pct'});
  // task stats: module not yet connected — omit from stats to avoid showing hardcoded zeros

  if(stats.length>0){
    h+='<div class="report-section-label">Chỉ số tổng hợp</div>';
    h+='<div class="stats-grid">';
    stats.forEach(s=>{
      const displayVal=fmtSmart(s.value,s.format);
      const displayPrev=fmtSmart(s.prev,s.format);
      h+='<div class="stat-box"><div class="stat-box-label">'+s.label+'</div><div class="stat-box-value">'+displayVal+'</div>';
      if(compare){
        const diff=s.value-s.prev;
        const pct=s.prev>0?Math.round((diff/s.prev)*100):0;
        const isUp=diff>0;
        const good=s.inverse?!isUp:isUp;
        h+='<div class="stat-box-prev">Kỳ trước: '+displayPrev+'</div>';
        h+='<div class="stat-box-compare '+(good?'up':'down')+'">'+(isUp?'▲':'▼')+' '+Math.abs(pct)+'%</div>';
      }
      h+='</div>';
    });
    h+='</div>';
  }

  // Charts config — with chart type hints: 'bar', 'doughnut', 'pie', 'horizontalBar'
  let chartConfigs=[];
  if(metrics.includes('order_status'))chartConfigs.push({id:'chart_order_status',title:'Đơn hàng theo trạng thái',cur:vc('orders','byStatus'),prev:pvc('orders','byStatus'),chartType:'bar'});
  if(metrics.includes('order_channel'))chartConfigs.push({id:'chart_order_channel',title:'Doanh thu theo kênh bán',cur:vc('orders','byChannel'),prev:pvc('orders','byChannel'),chartType:'doughnut'});
  if(metrics.includes('lead_source'))chartConfigs.push({id:'chart_lead_source',title:'Lead theo nguồn kênh',cur:vc('leads','bySource'),prev:pvc('leads','bySource'),chartType:'doughnut'});
  if(metrics.includes('lead_status'))chartConfigs.push({id:'chart_lead_status',title:'Lead theo giai đoạn pipeline',cur:vc('leads','byStatus'),prev:pvc('leads','byStatus'),chartType:'bar'});
  if(metrics.includes('lead_staff'))chartConfigs.push({id:'chart_lead_staff',title:'Lead theo NV phụ trách',cur:vc('leads','byStaff'),prev:pvc('leads','byStaff'),chartType:'bar'});
  if(metrics.includes('lead_country'))chartConfigs.push({id:'chart_lead_country',title:'Lead theo quốc gia',cur:vc('leads','byCountry'),prev:pvc('leads','byCountry'),chartType:'doughnut'});
  if(metrics.includes('lead_product'))chartConfigs.push({id:'chart_lead_product',title:'Sản phẩm được quan tâm nhiều nhất',cur:vc('leads','byProduct'),prev:pvc('leads','byProduct'),chartType:'bar'});
  if(metrics.includes('expense_category'))chartConfigs.push({id:'chart_expense_cat',title:'Chi phí theo danh mục',cur:vc('expenses','byCategory'),prev:pvc('expenses','byCategory'),chartType:'doughnut'});
  if(metrics.includes('expense_dept'))chartConfigs.push({id:'chart_expense_dept',title:'Chi phí theo phòng ban',cur:vc('expenses','byDept'),prev:pvc('expenses','byDept'),chartType:'bar'});
  if(metrics.includes('expense_payment'))chartConfigs.push({id:'chart_expense_pay',title:'Theo phương thức TT',cur:vc('expenses','byPayment'),prev:pvc('expenses','byPayment'),chartType:'pie'});
  if(metrics.includes('expense_type'))chartConfigs.push({id:'chart_expense_type',title:'Cố định vs Biến đổi',cur:vc('expenses','byType'),prev:pvc('expenses','byType'),chartType:'pie'});
  if(metrics.includes('wh_by_warehouse'))chartConfigs.push({id:'chart_wh_warehouse',title:'Tồn kho theo kho',cur:vc('warehouse','byWarehouse'),prev:pvc('warehouse','byWarehouse'),chartType:'bar'});
  if(metrics.includes('wh_by_type'))chartConfigs.push({id:'chart_wh_type',title:'Tồn kho theo loại SP',cur:vc('warehouse','byType'),prev:pvc('warehouse','byType'),chartType:'doughnut'});
  if(metrics.includes('user_status'))chartConfigs.push({id:'chart_user_status',title:'NV theo trạng thái',cur:vc('users','byStatus'),prev:pvc('users','byStatus'),chartType:'pie'});
  if(metrics.includes('user_dept'))chartConfigs.push({id:'chart_user_dept',title:'NV theo phòng ban',cur:vc('users','byDept'),prev:pvc('users','byDept'),chartType:'bar'});
  if(metrics.includes('user_kpi_rate'))chartConfigs.push({id:'chart_user_kpi',title:'Tỷ lệ KPI',cur:vc('users','kpiRate'),prev:pvc('users','kpiRate'),chartType:'pie'});
  if(metrics.includes('task_status'))chartConfigs.push({id:'chart_task_status',title:'Task theo trạng thái',cur:{labels:[],data:[]},prev:{labels:[],data:[]},chartType:'bar',comingSoon:true});
  if(metrics.includes('task_assignee'))chartConfigs.push({id:'chart_task_assignee',title:'Task theo người nhận',cur:{labels:[],data:[]},prev:{labels:[],data:[]},chartType:'bar',comingSoon:true});
  if(metrics.includes('task_priority'))chartConfigs.push({id:'chart_task_priority',title:'Task theo độ ưu tiên',cur:{labels:[],data:[]},prev:{labels:[],data:[]},chartType:'pie',comingSoon:true});

  if(chartConfigs.length>0){
    h+='<div class="report-section-label">Biểu đồ phân tích</div>';
    h+='<div class="charts-grid">';
    chartConfigs.forEach(cfg=>{
      const isEmpty=!cfg.cur||!cfg.cur.labels||cfg.cur.labels.length===0;
      h+='<div class="chart-container"><div class="chart-title">'+cfg.title+'</div>';
      if(cfg.comingSoon){h+='<div style="display:flex;align-items:center;justify-content:center;height:160px;flex-direction:column;gap:10px"><span class="tag-coming">⏳ Module đang phát triển</span><div style="font-size:10px;color:var(--h5c-text-muted)">Dữ liệu sẽ cập nhật sau khi module Công việc hoàn thiện</div></div>';}
      else if(isEmpty){h+='<div style="display:flex;align-items:center;justify-content:center;height:160px;color:var(--h5c-text-muted);font-size:12px;flex-direction:column;gap:10px"><span style="font-size:32px">📭</span><span>Không có dữ liệu trong kỳ này</span></div>';}
      else{const isR=(cfg.chartType==='doughnut'||cfg.chartType==='pie');h+='<div class="chart-wrap'+(isR?' round':'')+'"><canvas id="'+cfg.id+'"></canvas></div>';}
      h+='</div>';
    });
    h+='</div>';
  }

  // Tables: Top products
  const _hasTable = metrics.includes('order_product')||metrics.includes('order_customer');
  if(_hasTable) h+='<div class="report-section-label">Bảng chi tiết</div>';
  if(metrics.includes('order_product')){
    const tp = (cur.orders && cur.orders.topProducts) ? cur.orders.topProducts : [];
    h+='<div style="margin-top:16px"><div class="chart-title">Top sản phẩm bán chạy</div><table class="data-table"><thead><tr><th>#</th><th>Sản phẩm</th><th>SL</th><th>Doanh thu</th></tr></thead><tbody>';
    tp.forEach((p,i)=>{
      const qty = p.qty || 0;
      const rev = p.revenue || (p.qty * (p.unitPrice||0)) || 0;
      h+='<tr><td>'+(i+1)+'</td><td>'+p.name+'</td><td><strong>'+fmt(qty)+'</strong></td><td>'+fmt(rev)+'đ</td></tr>';
    });
    h+='</tbody></table></div>';
  }
  if(metrics.includes('order_customer')){
    const tc = (cur.orders && cur.orders.topCustomers) ? cur.orders.topCustomers : [];
    h+='<div style="margin-top:16px"><div class="chart-title">Top khách hàng</div><table class="data-table"><thead><tr><th>#</th><th>Khách hàng</th><th>Giá trị</th></tr></thead><tbody>';
    tc.forEach((c,i)=>{
      h+='<tr><td>'+(i+1)+'</td><td>'+c.name+'</td><td><strong>'+fmt(c.value)+'đ</strong></td></tr>';
    });
    h+='</tbody></table></div>';
  }

  // ── Monthly trend chart (if orders module selected and has revenue or total) ──
  if (neededModules.includes('orders') && (metrics.includes('order_revenue') || metrics.includes('order_total'))) {
    h+='<div class="report-section-label">Xu hướng theo thời gian</div>';
    h+='<div class="chart-container"><div class="chart-title">Xu hướng đơn hàng theo tháng</div><div class="chart-wrap" style="height:260px"><canvas id="chart_trend_orders"></canvas></div></div>';
  }

  h+='</div>';
  area.innerHTML=h;

  // Render charts
  Object.values(charts).forEach(c=>c.destroy());
  charts={};

  chartConfigs.forEach(cfg=>{
    const ctx=document.getElementById(cfg.id);
    if(!ctx) return; // empty state hoặc không có data
    if(!cfg.cur||!cfg.cur.labels||cfg.cur.labels.length===0) return;

    const isRound = cfg.chartType === 'doughnut' || cfg.chartType === 'pie';
    let config;

    if (isRound && !compare) {
      // Doughnut / Pie chart
      config={
        type: cfg.chartType,
        data:{
          labels:cfg.cur.labels,
          datasets:[{
            data:cfg.cur.data,
            backgroundColor:PALETTE.slice(0,cfg.cur.labels.length),
            borderWidth: cfg.chartType==='pie'?2:0,
            borderColor:'#fff'
          }]
        },
        options:{
          responsive:true,
          maintainAspectRatio:false,
          cutout: cfg.chartType==='doughnut'?'55%':0,
          layout:{padding:{bottom:8}},
          plugins:{
            legend:{display:true,position:'bottom',labels:{boxWidth:12,padding:10,font:{size:10}}},
            tooltip:{callbacks:{label:ctx=>ctx.label+': '+fmt(ctx.raw)}}
          }
        }
      };
    } else if (compare) {
      // Grouped bar chart for comparison (even for usually round charts)
      config={
        type:'bar',
        data:{
          labels:cfg.cur.labels,
          datasets:[
            {label:'Kỳ hiện tại',data:cfg.cur.data,backgroundColor:'#8FC643',borderRadius:4},
            {label:'Kỳ trước',data:cfg.prev.data,backgroundColor:'#9C8B7E',borderRadius:4}
          ]
        },
        options:{
          responsive:true,
          maintainAspectRatio:false,
          plugins:{
            legend:{display:true,position:'top',labels:{boxWidth:12,padding:8,font:{size:10}}},
            tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmt(ctx.raw)}}
          },
          scales:{
            y:{beginAtZero:true,grid:{color:'var(--h5c-border)'},ticks:{font:{size:10}}},
            x:{grid:{display:false},ticks:{font:{size:9},maxRotation:45,minRotation:0,autoSkip:false}}
          }
        }
      };
    } else {
      // Default bar chart
      config={
        type:'bar',
        data:{
          labels:cfg.cur.labels,
          datasets:[{data:cfg.cur.data,backgroundColor:PALETTE.slice(0,cfg.cur.labels.length),borderRadius:6}]
        },
        options:{
          responsive:true,
          maintainAspectRatio:false,
          plugins:{
            legend:{display:false},
            tooltip:{callbacks:{label:ctx=>ctx.label+': '+fmt(ctx.raw)}}
          },
          scales:{
            y:{beginAtZero:true,grid:{color:'var(--h5c-border)'},ticks:{font:{size:10}}},
            x:{grid:{display:false},ticks:{font:{size:9},maxRotation:45,minRotation:0,autoSkip:false}}
          }
        }
      };
    }

    charts[cfg.id]=new Chart(ctx,config);
  });

  // ── Render monthly trend line chart ──
  const trendCtx = document.getElementById('chart_trend_orders');
  if (trendCtx) {
    // Apply date filter: show months within the selected range
    const trendFrom = state.dateFrom ? new Date(state.dateFrom) : new Date('2000-01-01');
    const trendTo   = state.dateTo   ? new Date(state.dateTo)   : new Date('2099-12-31');
    const allOrdersTrend = (H5C.get('orders')||[]).filter(o => {
      if(o.status==='cancelled') return false;
      const dt = o.createdAt || o.date || '';
      if(!dt) return false;
      const d = new Date(dt);
      return d >= trendFrom && d <= trendTo;
    });
    const monthMap = {};
    allOrdersTrend.forEach(o => {
      const dt = o.createdAt || o.date || '';
      if (!dt) return;
      const k = dt.slice(0,7);
      if (!monthMap[k]) monthMap[k] = {count:0, revenue:0};
      monthMap[k].count++;
      monthMap[k].revenue += (o.total||0);
    });
    const sortedMonths = Object.keys(monthMap).sort();
    if (sortedMonths.length >= 1) {
      charts['chart_trend_orders'] = new Chart(trendCtx, {
        type:'line',
        data:{
          labels: sortedMonths.map(k => {const [y,m]=k.split('-');return m+'/'+y.slice(2);}),
          datasets:[
            {label:'Doanh thu (triệu)',data:sortedMonths.map(k=>(monthMap[k].revenue/1e6)),borderColor:'#8FC643',backgroundColor:'rgba(143,198,67,.12)',fill:true,tension:.35,borderWidth:2.5,pointBackgroundColor:'#8FC643',pointRadius:4},
            {label:'Số đơn',data:sortedMonths.map(k=>monthMap[k].count),borderColor:'#4A7FB5',backgroundColor:'transparent',borderWidth:2,tension:.35,pointBackgroundColor:'#4A7FB5',pointRadius:4,yAxisID:'y1'}
          ]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{position:'top',labels:{boxWidth:12,font:{size:10}}},tooltip:{callbacks:{label:ctx=>{if(ctx.datasetIndex===0)return'Doanh thu: '+fmtSmart(ctx.raw*1e6,'money');return'Số đơn: '+fmt(ctx.raw);}}}},
          scales:{
            y:{beginAtZero:true,position:'left',title:{display:true,text:'Triệu VNĐ',font:{size:10}},grid:{color:'var(--h5c-border)'},ticks:{font:{size:10}}},
            y1:{beginAtZero:true,position:'right',title:{display:true,text:'Số đơn',font:{size:10}},grid:{drawOnChartArea:false},ticks:{font:{size:10}}},
            x:{grid:{display:false},ticks:{font:{size:9}}}
          }
        }
      });
    } else {
      trendCtx.parentElement.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:160px;color:var(--h5c-text-muted);font-size:12px;flex-direction:column;gap:10px"><span style="font-size:32px">📭</span><span>Không có dữ liệu trong kỳ này</span></div>';
    }
  }
}

function exportReport(){
  // Simple CSV export of the report area stats
  const boxes = document.querySelectorAll('.stat-box');
  if (!boxes.length) { alert('Không có dữ liệu để xuất!'); return; }
  let csv = 'Chỉ số,Giá trị\n';
  boxes.forEach(box => {
    const label = box.querySelector('.stat-box-label')?.textContent || '';
    const value = box.querySelector('.stat-box-value')?.textContent || '';
    csv += '"'+label+'","'+value+'"\n';
  });
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'bao_cao_'+state.dateFrom+'_'+state.dateTo+'.csv';
  a.click(); URL.revokeObjectURL(url);
}

// ===== SHARED AUTH (sessionStorage) =====

// ═══════════════════════════════════════════════════════════
// H5C SHARED DATA STORE  (localStorage, prefix h5c_v1_)
// Keys: employees | attendance | kpi | skus | lots
//       orders | leads | expenses | announcements
//       pending_order  (leads → orders handoff)
// ═══════════════════════════════════════════════════════════
const H5C = {
  _k: k => 'h5c_v1_' + k,
  get(k)        { try { const v = localStorage.getItem(this._k(k)); return v ? JSON.parse(v) : null; } catch(e) { return null; } },
  set(k, v)     { try { localStorage.setItem(this._k(k), JSON.stringify(v)); } catch(e) {} },
  init(k, def)  { const v = this.get(k); if (v !== null) return v; this.set(k, def); return def; },
  clear(k)      { localStorage.removeItem(this._k(k)); },
  // Merge stored employees into a local array (for modules that read but don't own employees)
  mergeEmployees(arr) {
    const stored = this.get('employees');
    if (stored && stored.length) { arr.splice(0, arr.length, ...stored); }
  },
  // Get active employee names for sales dropdowns
  salesList() {
    const emps = this.get('employees') || [];
    const active = emps.filter(e => e.status !== 'inactive');
    return active.map(e => e.name);
  },
  // Get SKUs in PRODUCTS_LIST format for orders/leads
  productsList() {
    const skus = this.get('skus') || [];
    if (!skus.length) return null;
    const UNIT_MAP = {kg:'Kg',hop:'Hộp',chiec:'Chiếc',tui:'Túi',stick:'Stick',cont:'Cont'};
    return skus.map(s => ({
      id: s.id, name: s.name,
      unit: UNIT_MAP[s.unit] || s.unit || 'Cái',
      price: s.suggestedPrice || 0
    }));
  }
};
// ═══════════════════════════════════════════════════════════

  const pageMap = {

    leads: 'leads.html',

    expenses: 'expenses.html',
    warehouse: 'warehouse.html',
    users: 'users.html',
    reports: 'reports.html',
    announcements: 'announcements.html',

  if (pageMap[p]) {
    window.location.href = pageMap[p];

    alert('Module "' + p + '" đang được phát triển!');
  }
}
