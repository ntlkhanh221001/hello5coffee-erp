// === Granular Permission Engine v2 ===
function _can(permId){
  try{
    const session=state.user; if(!session)return false;
    const accounts=JSON.parse(localStorage.getItem('h5c_v1_accounts')||'[]');
    const acc=accounts.find(a=>a.email===(session.email||''));
    if(!acc) return session.role==='C_LEVEL';
    if(acc.permissions){
      const val=acc.permissions[permId];
      return val===true||val==='all'||val==='own';
    }
    if(acc.role==='C_LEVEL') return true;
    return _roleDefault(acc.role,permId);
  }catch(e){return state.user&&state.user.role==='C_LEVEL';}
}
function _roleDefault(role,pid){
  const S=['dash.view','dash.top_sales','orders.view','orders.view_detail','orders.view_commission','orders.view_history','orders.create','orders.edit','orders.update_progress','orders.request_cancel','orders.submit_request','leads.view','leads.view_detail','leads.view_stats','leads.create','leads.edit','leads.contact_log','leads.convert_order','ann.view'];
  const F=['dash.view','dash.kpi_finance','expenses.view','expenses.view_detail','expenses.view_charts','expenses.create','expenses.edit','expenses.mark_paid','reports.view','reports.generate','reports.compare','ann.view'];
  const H=['dash.view','users.view','users.view_salary','users.view_team','users.create','users.edit','users.attendance','users.kpi','ann.view','ann.create','ann.edit'];
  const M_DENY=['users.manage_accounts','users.manage_permissions','orders.commission_config','wh.commission_config'];
  if(role==='EMPLOYEE_SALES') return S.includes(pid);
  if(role==='EMPLOYEE_FINANCE') return F.includes(pid);
  if(role==='EMPLOYEE_HR') return H.includes(pid);
  if(role==='MANAGER') return !M_DENY.includes(pid);
  return false;
}
// === End Permission Engine ===

function canApprove(ann){
  return _can('ann.approve');

function needsApproval(){
  return !_can('ann.approve');

  if(ann.target==='select'&&ann.selectedPeople)return EMPLOYEES.filter(e=>ann.selectedPeople.includes(e.id));
  return EMPLOYEES;
}

function canSeeAnn(a){
  if(a.target==='all')return true;
  if(a.target==='dept')return a.dept===state.user.dept||a.createdBy===state.user.id;
  if(a.target==='select')return (a.selectedPeople&&a.selectedPeople.includes(state.user.id))||a.createdBy===state.user.id;
  return true;
}

function saveAnnounce(e){
  e.preventDefault();
  const id=document.getElementById('annId').value;
  const target=document.getElementById('annTarget').value;
  const isScheduled=document.getElementById('annScheduled').checked;
  const scheduleDate=document.getElementById('annScheduleDate').value;
  const scheduleTime=document.getElementById('annScheduleTime').value;
  
  let status='approved';
  if(needsApproval())status='pending';
  else if(isScheduled&&scheduleDate&&scheduleTime)status='scheduled';
  
  const data={
    id:id||'ANN'+String(ANNOUNCEMENTS.length+1).padStart(3,'0'),
    title:document.getElementById('annTitle').value,
    type:document.getElementById('annType').value,
    target:target,
    dept:target==='dept'?document.getElementById('annDept').value:'',
    selectedPeople:target==='select'?getSelectedPeople():[],
    content:document.getElementById('annContent').value,
    pinned:document.getElementById('annPinned').checked,
    anonymous:document.getElementById('annAnonymous').checked,
    scheduledAt:isScheduled&&scheduleDate&&scheduleTime?scheduleDate+' '+scheduleTime:null,
    createdBy:state.user.id,
    createdAt:new Date().toISOString().replace('T',' ').substring(0,16),
    status:status,
    approvedBy:needsApproval()?null:state.user.id,
    readBy:status==='approved'?[state.user.id]:[]
  };
  
  if(id){
    const i=ANNOUNCEMENTS.findIndex(x=>x.id===id);
    if(i>=0){data.readBy=ANNOUNCEMENTS[i].readBy;data.status=ANNOUNCEMENTS[i].status;data.approvedBy=ANNOUNCEMENTS[i].approvedBy;ANNOUNCEMENTS[i]=data;}
  }else{
    ANNOUNCEMENTS.push(data);
  }
  
  closeModal('announceModal');
  if(data.status==='pending')alert('✅ Thông báo đã được gửi và đang chờ duyệt!');
  render();
}

  h+='</div>';

  // Read list
  if(a.status==='approved'){
    h+='<div class="read-list"><div class="read-list-title">👁️ Trạng thái đã đọc ('+a.readBy.length+'/'+targetEmps.length+')</div><div class="read-list-grid">';
    targetEmps.forEach(e=>{
      const hasRead=a.readBy.includes(e.id);

    });
    h+='</div></div>';
  }
  
  document.getElementById('detailContent').innerHTML=h;
  
  // Buttons
  let btns='<button class="modal-btn cancel" onclick="closeModal(\'detailModal\');render()">Đóng</button>';
  
  if(a.status==='pending'&&canApprove(a)){
    // Pending - chỉ có Từ chối và Duyệt
    btns+='<button class="modal-btn danger" onclick="rejectAnnounce(\''+a.id+'\')">❌ Từ chối</button>';
    btns+='<button class="modal-btn success" onclick="approveAnnounce(\''+a.id+'\')">✅ Duyệt</button>';
  }else if(a.status==='scheduled'&&(a.createdBy===state.user.id||_can('ann.approve'))){
    // Scheduled - có thể Hủy hẹn hoặc Đăng ngay
    btns+='<button class="modal-btn danger" onclick="closeModal(\'detailModal\');deleteAnnounce(\''+a.id+'\')">🗑️ Hủy</button>';
    btns+='<button class="modal-btn success" onclick="publishNow(\''+a.id+'\')">🚀 Đăng ngay</button>';
  }else if(a.status==='approved'&&(a.createdBy===state.user.id||_can('ann.approve'))){
    // Approved - người tạo hoặc C-Level có thể xóa
    btns+='<button class="modal-btn danger" onclick="closeModal(\'detailModal\');deleteAnnounce(\''+a.id+'\')">🗑️ Xóa</button>';
  }
  document.getElementById('detailBtns').innerHTML=btns;
  
  document.getElementById('detailModal').classList.remove('hidden');
}

function approveAnnounce(id){
  const a=ANNOUNCEMENTS.find(x=>x.id===id);
  if(a){
    a.status='approved';
    a.approvedBy=state.user.id;
    a.readBy=[state.user.id];
    a.scheduledAt=null;
  }
  closeModal('detailModal');
  render();
}

function publishNow(id){
  const a=ANNOUNCEMENTS.find(x=>x.id===id);
  if(a){
    a.status='approved';
    a.scheduledAt=null;
    a.readBy=[state.user.id];
  }
  closeModal('detailModal');
  render();
}

function rejectAnnounce(id){
  ANNOUNCEMENTS=ANNOUNCEMENTS.filter(a=>a.id!==id);

  render();
}

function deleteAnnounce(id){
  if(!_can('ann.delete')){alert('Không có quyền xóa');return;}
  state.deleteId=id;
  document.getElementById('deleteModal').classList.remove('hidden');
}

function confirmDelete(){
  ANNOUNCEMENTS=ANNOUNCEMENTS.filter(a=>a.id!==state.deleteId);
  closeModal('deleteModal');
  render();
}

// ═══════════════════════════════════════════════════════════
// H5C SHARED DATA STORE  (localStorage, prefix h5c_v1_)
// Keys: employees | attendance | kpi | skus | lots
//       orders | leads | expenses | announcements
//       pending_order  (leads → orders handoff)
// ═══════════════════════════════════════════════════════════
const H5C = {
  _k: k => 'h5c_v1_' + k,
  get(k)        { try { const v = localStorage.getItem(this._k(k)); return v ? JSON.parse(v) : null; } catch(e) { return null; } },
  set(k, v)     { try { localStorage.setItem(this._k(k), JSON.stringify(v)); } catch(e) {} },
  init(k, def)  { const v = this.get(k); if (v !== null) return v; this.set(k, def); return def; },
  clear(k)      { localStorage.removeItem(this._k(k)); },
  // Merge stored employees into a local array (for modules that read but don't own employees)
  mergeEmployees(arr) {
    const stored = this.get('employees');
    if (stored && stored.length) { arr.splice(0, arr.length, ...stored); }
  },
  // Get active employee names for sales dropdowns
  salesList() {
    const emps = this.get('employees') || [];
    const active = emps.filter(e => e.status !== 'inactive');
    return active.map(e => e.name);
  },
  // Get SKUs in PRODUCTS_LIST format for orders/leads
  productsList() {
    const skus = this.get('skus') || [];
    if (!skus.length) return null;
    const UNIT_MAP = {kg:'Kg',hop:'Hộp',chiec:'Chiếc',tui:'Túi',stick:'Stick',cont:'Cont'};
    return skus.map(s => ({
      id: s.id, name: s.name,
      unit: UNIT_MAP[s.unit] || s.unit || 'Cái',
      price: s.suggestedPrice || 0
    }));
  }
};
// ═══════════════════════════════════════════════════════════

const SESSION_KEY = 'h5c_erp_user';

function saveSession(user) {

}

}

function clearSession() {

}

  const pageMap = {
    dashboard: 'dashboard.html',
    leads: 'leads.html',
    orders: 'orders.html',
    expenses: 'expenses.html',
    warehouse: 'warehouse.html',
    users: 'users.html',
    reports: 'reports.html',
    announcements: 'announcements.html',
  };
  if (pageMap[p]) {
    window.location.href = pageMap[p];
  } else {
    alert('Module "' + p + '" đang được phát triển!');
  }
}

// Auto-login from session on page load
window.addEventListener('DOMContentLoaded', function() {
  H5C.mergeEmployees(EMPLOYEES);
  const saved = loadSession();
  if (saved) {
    state.user = saved;
    showMain();
  }
});
// ===== END SHARED AUTH =====

function setLang(l) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
}
</script>
