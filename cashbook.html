<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Hello 5 Coffee — Sổ quỹ</title>
<link rel="stylesheet" href="h5c-design.css?v=3"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="core.js?v=3"></script>
<script src="sidebar.js?v=3"></script>
<style>
.cb-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.cb-filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filter-input{padding:10px 14px;border:1px solid var(--h5c-border);border-radius:var(--h5c-radius-md);font-size:13px;background:var(--h5c-surface);color:var(--h5c-text);min-width:140px}
.filter-input:focus{outline:none;border-color:var(--h5c-copper)}
.tab-bar{display:flex;gap:4px;background:var(--h5c-bg-subtle);border-radius:var(--h5c-radius-md);padding:4px;margin-bottom:20px;width:fit-content}
.tab-btn{padding:10px 24px;border:none;border-radius:var(--h5c-radius-sm);background:transparent;font-size:13px;font-weight:600;color:var(--h5c-text-secondary);cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--h5c-surface);color:var(--h5c-text);box-shadow:var(--h5c-shadow-sm)}
.tab-btn .count{display:inline-block;background:var(--h5c-bg-subtle);padding:2px 8px;border-radius:var(--h5c-radius-full);font-size:10px;font-weight:700;margin-left:6px}
.tab-btn.active .count{background:var(--h5c-copper-light);color:var(--h5c-copper-dark)}
.stat-sub{font-size:11px;color:var(--h5c-text-secondary);margin-top:2px}
.kpi-card.highlight{background:linear-gradient(135deg,var(--h5c-espresso) 0%,#2A1C14 100%);border:none}
.kpi-card.highlight .kpi-label{color:rgba(255,255,255,.7)}
.kpi-card.highlight .kpi-value{color:var(--h5c-copper)}
.kpi-card.highlight .stat-sub{color:rgba(255,255,255,.5)}
.type-badge{display:inline-block;padding:4px 10px;border-radius:var(--h5c-radius-full);font-size:11px;font-weight:700}
.type-badge.thu{background:var(--h5c-sage-light);color:var(--h5c-sage)}
.type-badge.chi{background:var(--h5c-terracotta-light);color:var(--h5c-terracotta)}
.status-badge{display:inline-block;padding:4px 10px;border-radius:var(--h5c-radius-full);font-size:11px;font-weight:700}
.status-badge.draft{background:var(--h5c-bg-subtle);color:var(--h5c-text-secondary)}
.status-badge.confirmed{background:var(--h5c-sage-light);color:var(--h5c-sage)}
.status-badge.cancelled{background:var(--h5c-terracotta-light);color:var(--h5c-terracotta)}
.method-badge{display:inline-block;padding:3px 8px;border-radius:var(--h5c-radius-full);font-size:10px;font-weight:600;background:var(--h5c-bg-subtle);color:var(--h5c-text-secondary)}
.action-btns{display:flex;gap:6px}
.action-btn{width:30px;height:30px;border:none;border-radius:var(--h5c-radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--h5c-bg-subtle);color:var(--h5c-text);transition:all .2s}
.action-btn.edit:hover{background:var(--h5c-amber);color:#fff}
.action-btn.confirm:hover{background:var(--h5c-sage);color:#fff}
.action-btn.delete:hover{background:var(--h5c-terracotta);color:#fff}
/* Ledger */
.ledger-day{margin-bottom:24px}
.ledger-day-header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:var(--h5c-bg-subtle);border-radius:var(--h5c-radius-sm);margin-bottom:8px;font-size:13px;font-weight:700}
.ledger-day-header .subtotal{font-size:12px;font-weight:600}
.ledger-row{display:grid;grid-template-columns:100px 1fr 100px 120px 120px 120px;gap:8px;padding:10px 16px;border-bottom:1px solid var(--h5c-border-subtle);font-size:12px;align-items:center}
.ledger-row:hover{background:var(--h5c-bg)}
.ledger-row .amount-in{color:var(--h5c-sage);font-weight:700}
.ledger-row .amount-out{color:var(--h5c-terracotta);font-weight:700}
.ledger-row .balance{font-weight:800;color:var(--h5c-text)}
.chart-container{position:relative;height:280px}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.modal-row.three{grid-template-columns:1fr 1fr 1fr}
.modal-group{margin-bottom:16px}
.modal-label{font-size:12px;font-weight:600;color:var(--h5c-text-secondary);margin-bottom:6px;display:block}
.bank-card{border:1px solid var(--h5c-border);border-radius:var(--h5c-radius-md);padding:16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.bank-card .info{flex:1}
.bank-card .info .name{font-weight:700;font-size:14px}
.bank-card .info .detail{font-size:11px;color:var(--h5c-text-secondary);margin-top:2px}
.bank-card .balance{text-align:right}
.bank-card .balance .amount{font-size:18px;font-weight:800;color:var(--h5c-sage)}
.bank-card .balance .label{font-size:10px;color:var(--h5c-text-secondary)}
@media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(2,1fr)!important}}
@media(max-width:900px){.modal-row,.modal-row.three{grid-template-columns:1fr}.ledger-row{grid-template-columns:80px 1fr 80px 100px}}
</style>
</head>
<body>

<div id="loginPage" class="login-page">
  <div class="login-box">
    <div class="login-logo">☕</div><div class="login-title">Hello 5 Coffee</div>
    <div class="login-subtitle">Hệ thống Quản lý Nội bộ</div>
    <div class="login-slogan">Tỉnh thức 5 giác quan · Sống sâu từng khoảnh khắc</div>
    <div id="loginError" class="login-error">Email hoặc mật khẩu không đúng</div>
    <input type="email" id="loginEmail" class="login-input" placeholder="Email" autocomplete="email">
    <input type="password" id="loginPassword" class="login-input" placeholder="Mật khẩu" autocomplete="current-password">
    <button class="login-btn" onclick="handleLogin()">Đăng nhập</button>
  </div>
</div>

<div id="mainLayout" class="layout hidden">
  <aside class="sidebar"></aside>
  <main class="main">
    <header class="topbar">
      <div class="topbar-left"><div class="page-title">Sổ quỹ</div></div>
      <div class="topbar-right">
        <div class="user-info"><div class="user-avatar" id="userAvatar">TT</div><div><div class="user-name" id="userName">—</div><div class="user-role" id="userRole">—</div></div></div>
        <button class="logout-btn" onclick="handleLogout()">Đăng xuất</button>
      </div>
    </header>
    <div class="content" id="pageContent"></div>
  </main>
</div>

<!-- Receipt/Payment Modal -->
<div id="entryModal" class="modal-overlay hidden">
<div class="modal" style="max-width:580px">
  <div class="modal-title" id="entryModalTitle">Tạo phiếu thu</div>
  <form id="entryForm" onsubmit="saveEntry(event)">
    <input type="hidden" id="entryId"><input type="hidden" id="entryDirection">
    <div class="modal-row">
      <div class="modal-group"><label class="modal-label">Ngày *</label><input type="date" id="entryDate" class="modal-input" required></div>
      <div class="modal-group"><label class="modal-label">Số tiền (VNĐ) *</label><input type="number" id="entryAmount" class="modal-input" required min="1"></div>
    </div>
    <div class="modal-row">
      <div class="modal-group"><label class="modal-label">Danh mục *</label>
        <select id="entryCategory" class="modal-input" required></select>
      </div>
      <div class="modal-group"><label class="modal-label">Phương thức *</label>
        <select id="entryMethod" class="modal-input" required>
          <option value="tien_mat">Tiền mặt</option><option value="ngan_hang">Chuyển khoản NH</option><option value="the">Thẻ</option>
        </select>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-group"><label class="modal-label">Đối tượng</label><input type="text" id="entryParty" class="modal-input" placeholder="Tên KH / NCC"></div>
      <div class="modal-group"><label class="modal-label">Mã tham chiếu</label><input type="text" id="entryRef" class="modal-input" placeholder="Mã đơn hàng, chi phí..."></div>
    </div>
    <div class="modal-group"><label class="modal-label">Diễn giải *</label><input type="text" id="entryDesc" class="modal-input" required></div>
    <div class="modal-group"><label class="modal-label">Ghi chú</label><textarea id="entryNote" class="modal-input" rows="2"></textarea></div>
    <div class="modal-btns">
      <button type="button" class="modal-btn cancel" onclick="closeModal('entryModal')">Hủy</button>
      <button type="submit" class="modal-btn primary">Lưu</button>
    </div>
  </form>
</div>
</div>

<!-- Bank Account Modal -->
<div id="bankModal" class="modal-overlay hidden">
<div class="modal" style="max-width:480px">
  <div class="modal-title" id="bankModalTitle">Thêm tài khoản NH</div>
  <form id="bankForm" onsubmit="saveBank(event)">
    <input type="hidden" id="bankId">
    <div class="modal-group"><label class="modal-label">Tên ngân hàng *</label><input type="text" id="bankName" class="modal-input" required></div>
    <div class="modal-row">
      <div class="modal-group"><label class="modal-label">Số tài khoản *</label><input type="text" id="bankNumber" class="modal-input" required></div>
      <div class="modal-group"><label class="modal-label">Chủ tài khoản</label><input type="text" id="bankHolder" class="modal-input"></div>
    </div>
    <div class="modal-row">
      <div class="modal-group"><label class="modal-label">Chi nhánh</label><input type="text" id="bankBranch" class="modal-input"></div>
      <div class="modal-group"><label class="modal-label">Số dư ban đầu</label><input type="number" id="bankBalance" class="modal-input" value="0"></div>
    </div>
    <div class="modal-btns">
      <button type="button" class="modal-btn cancel" onclick="closeModal('bankModal')">Hủy</button>
      <button type="submit" class="modal-btn primary">Lưu</button>
    </div>
  </form>
</div>
</div>

<script>
const H5C=window.H5C||{
  _k:k=>'h5c_v1_'+k,
  get(k){try{const v=localStorage.getItem(this._k(k));return v?JSON.parse(v):null;}catch(e){return null;}},
  set(k,v){try{localStorage.setItem(this._k(k),JSON.stringify(v));}catch(e){}},
  init(k,def){const v=this.get(k);if(v!==null)return v;this.set(k,def);return def;},
  clear(k){localStorage.removeItem(this._k(k));},
  salesList(){const e=this.get('employees')||[];return e.filter(x=>x.status!=='inactive').map(x=>x.name);}
};

const fmt=n=>new Intl.NumberFormat('vi-VN').format(Math.round(n||0));
const fmtB=n=>{if(n>=1e9)return(n/1e9).toFixed(1)+' tỷ';if(n>=1e6)return Math.round(n/1e6)+' tr';return fmt(n);};
const formatDate=d=>{if(!d)return'—';const dt=new Date(d);return String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0')+'/'+dt.getFullYear();};
const getInitials=n=>n?n.split(' ').map(w=>w[0]).slice(-2).join('').toUpperCase():'?';

Chart.defaults.font.family='Be Vietnam Pro';
Chart.defaults.color='#6B5B4E';

const CAT_THU={ban_hang:'Bán hàng',thu_no:'Thu nợ',lai:'Lãi/Đầu tư',khac_thu:'Thu khác'};
const CAT_CHI={mua_hang:'Mua hàng/NVL',tra_no:'Trả nợ NCC',luong:'Lương',van_hanh:'Vận hành',marketing:'Marketing',khac_chi:'Chi khác'};
const METHOD_LABELS={tien_mat:'Tiền mặt',ngan_hang:'Chuyển khoản',the:'Thẻ'};
const STATUS_LABELS={draft:'Nháp',confirmed:'Đã xác nhận',cancelled:'Đã hủy'};

function _can(permId){
  try{
    const session=state.user;if(!session)return false;
    const accounts=JSON.parse(localStorage.getItem('h5c_v1_accounts')||'[]');
    const acc=accounts.find(a=>(a.email||'').toLowerCase()===(session.email||'').toLowerCase());
    if(!acc)return session.role==='C_LEVEL';
    if(acc.permissions){const val=acc.permissions[permId];return val===true||val==='all'||val==='own';}
    if(acc.role==='C_LEVEL'||acc.role==='MANAGER'||acc.role==='EMPLOYEE_FINANCE')return true;
    return false;
  }catch(e){return state.user&&state.user.role==='C_LEVEL';}
}

let RECEIPTS=[],PAYMENTS_OUT=[],BANKS=[];
let state={user:null,tab:'ledger',search:'',filterType:'all',filterMethod:'all',dateFrom:'',dateTo:'',charts:{}};

const SESSION_KEY='h5c_erp_user';
function saveSession(user){localStorage.setItem(SESSION_KEY,JSON.stringify({...user,loginAt:Date.now()}));}
function loadSession(){try{const raw=localStorage.getItem(SESSION_KEY);if(!raw)return null;const s=JSON.parse(raw);if(s.loginAt&&Date.now()-s.loginAt>8*3600000){localStorage.removeItem(SESSION_KEY);return null;}return s;}catch(e){return null;}}
function clearSession(){localStorage.removeItem(SESSION_KEY);}

function _getAccountsForLogin(){
  const stored=H5C.get('accounts');if(stored&&stored.length)return stored;
  return[
    {email:'admin@hello5coffee.com',pw:'Admin@123456',name:'Louis Nguyen',role:'C_LEVEL',pos:'CCO & Co-Founder',empId:'EMP001'},
    {email:'manager@hello5coffee.com',pw:'123456',name:'Nguyễn Thị Lan',role:'MANAGER',pos:'Trưởng phòng',empId:'EMP002'},
    {email:'finance@hello5coffee.com',pw:'123456',name:'Phạm Thị Mai',role:'EMPLOYEE_FINANCE',pos:'Kế toán viên',empId:'EMP004'}
  ];
}
function handleLogin(){
  const email=document.getElementById('loginEmail').value.trim().toLowerCase();
  const pw=document.getElementById('loginPassword').value;
  const acc=_getAccountsForLogin().find(a=>(a.email||'').toLowerCase()===email&&a.pw===pw);
  if(!acc){document.getElementById('loginError').style.display='block';return;}
  document.getElementById('loginError').style.display='none';
  state.user={name:acc.name,email:acc.email,role:acc.role,pos:acc.pos,empId:acc.empId};
  saveSession(state.user);showMain();
}
function handleLogout(){state.user=null;clearSession();document.getElementById('loginPage').style.display='';document.getElementById('mainLayout').classList.add('hidden');}
function showMain(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('mainLayout').classList.remove('hidden');
  document.getElementById('userName').textContent=state.user.name;
  document.getElementById('userRole').textContent=state.user.pos||'';
  document.getElementById('userAvatar').textContent=getInitials(state.user.name);
  render();
}

function loadData(){
  RECEIPTS=H5C.get('cash_receipts')||[];
  PAYMENTS_OUT=H5C.get('cash_payments')||[];
  BANKS=H5C.get('bank_accounts')||[];
}

function getAllEntries(){
  const all=[];
  RECEIPTS.forEach(r=>all.push({...r,dir:'thu'}));
  PAYMENTS_OUT.forEach(p=>all.push({...p,dir:'chi'}));
  return all.sort((a,b)=>a.date>b.date?1:a.date<b.date?-1:0);
}

// ════════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════════
function render(){
  loadData();
  const now=new Date();const monthKey=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const allEntries=getAllEntries();
  const monthEntries=allEntries.filter(e=>(e.date||'').startsWith(monthKey));
  const totalThu=monthEntries.filter(e=>e.dir==='thu').reduce((s,e)=>s+(e.amount||0),0);
  const totalChi=monthEntries.filter(e=>e.dir==='chi').reduce((s,e)=>s+(e.amount||0),0);
  const cashBalance=allEntries.filter(e=>e.method==='tien_mat'&&e.status!=='cancelled').reduce((s,e)=>s+(e.dir==='thu'?1:-1)*(e.amount||0),0);
  const bankBalance=BANKS.reduce((s,b)=>s+(b.currentBalance||0),0)+allEntries.filter(e=>e.method==='ngan_hang'&&e.status!=='cancelled').reduce((s,e)=>s+(e.dir==='thu'?1:-1)*(e.amount||0),0);

  let html=`
    <div class="kpi-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px">
      <div class="kpi-card"><div class="kpi-label">Thu tháng này</div><div class="kpi-value" style="color:var(--h5c-sage)">+${fmtB(totalThu)}đ</div><div class="stat-sub">${monthEntries.filter(e=>e.dir==='thu').length} phiếu thu</div></div>
      <div class="kpi-card"><div class="kpi-label">Chi tháng này</div><div class="kpi-value" style="color:var(--h5c-terracotta)">−${fmtB(totalChi)}đ</div><div class="stat-sub">${monthEntries.filter(e=>e.dir==='chi').length} phiếu chi</div></div>
      <div class="kpi-card highlight"><div class="kpi-label">Quỹ tiền mặt</div><div class="kpi-value">${fmtB(cashBalance)}đ</div><div class="stat-sub">Tổng lũy kế</div></div>
      <div class="kpi-card highlight"><div class="kpi-label">Số dư NH</div><div class="kpi-value">${fmtB(bankBalance)}đ</div><div class="stat-sub">${BANKS.length} tài khoản</div></div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn${state.tab==='ledger'?' active':''}" onclick="state.tab='ledger';render()">Sổ quỹ</button>
      <button class="tab-btn${state.tab==='thu'?' active':''}" onclick="state.tab='thu';render()">Phiếu thu <span class="count">${RECEIPTS.length}</span></button>
      <button class="tab-btn${state.tab==='chi'?' active':''}" onclick="state.tab='chi';render()">Phiếu chi <span class="count">${PAYMENTS_OUT.length}</span></button>
      <button class="tab-btn${state.tab==='bank'?' active':''}" onclick="state.tab='bank';render()">Tài khoản NH <span class="count">${BANKS.length}</span></button>
      <button class="tab-btn${state.tab==='charts'?' active':''}" onclick="state.tab='charts';render();setTimeout(renderCharts,100)">Biểu đồ</button>
    </div>`;

  if(state.tab==='ledger')html+=renderLedger(allEntries);
  else if(state.tab==='thu')html+=renderEntryTable('thu',RECEIPTS);
  else if(state.tab==='chi')html+=renderEntryTable('chi',PAYMENTS_OUT);
  else if(state.tab==='bank')html+=renderBanks();
  else html+=renderChartsHTML();

  document.getElementById('pageContent').innerHTML=html;
  if(state.tab==='charts')setTimeout(renderCharts,50);
}

function renderLedger(allEntries){
  let filtered=allEntries.filter(e=>e.status!=='cancelled');
  if(state.filterType!=='all')filtered=filtered.filter(e=>e.dir===state.filterType);
  if(state.filterMethod!=='all')filtered=filtered.filter(e=>e.method===state.filterMethod);
  if(state.dateFrom)filtered=filtered.filter(e=>e.date>=state.dateFrom);
  if(state.dateTo)filtered=filtered.filter(e=>e.date<=state.dateTo);

  // Group by date
  const groups={};
  filtered.forEach(e=>{const d=e.date||'unknown';if(!groups[d])groups[d]=[];groups[d].push(e);});
  const sortedDates=Object.keys(groups).sort().reverse();

  let h=`<div class="card">
    <div class="cb-header">
      <div class="cb-filters">
        <select class="filter-input" onchange="state.filterType=this.value;render()">
          <option value="all">Tất cả</option><option value="thu"${state.filterType==='thu'?' selected':''}>Thu</option><option value="chi"${state.filterType==='chi'?' selected':''}>Chi</option>
        </select>
        <select class="filter-input" onchange="state.filterMethod=this.value;render()">
          <option value="all">Mọi PT</option>
          ${Object.entries(METHOD_LABELS).map(([k,v])=>`<option value="${k}"${state.filterMethod===k?' selected':''}>${v}</option>`).join('')}
        </select>
        <input type="date" class="filter-input" value="${state.dateFrom}" onchange="state.dateFrom=this.value;render()" title="Từ ngày">
        <input type="date" class="filter-input" value="${state.dateTo}" onchange="state.dateTo=this.value;render()" title="Đến ngày">
      </div>
      <div style="display:flex;gap:8px">
        ${_can('cashbook.create')?'<button class="btn primary" onclick="openEntryModal(\'thu\')">+ Phiếu thu</button><button class="btn secondary" onclick="openEntryModal(\'chi\')">+ Phiếu chi</button>':''}
      </div>
    </div>`;

  if(!sortedDates.length){
    h+=`<div style="text-align:center;padding:50px;color:var(--h5c-text-secondary)"><div style="font-size:48px;margin-bottom:12px">📒</div><p>Sổ quỹ trống</p></div>`;
  }else{
    let runningBalance=0;
    // Calculate initial balance from entries before the filtered range
    const allSorted=[...allEntries].filter(e=>e.status!=='cancelled').sort((a,b)=>a.date>b.date?1:-1);
    allSorted.forEach(e=>{
      if(state.dateFrom&&e.date<state.dateFrom){
        runningBalance+=e.dir==='thu'?(e.amount||0):-(e.amount||0);
      }
    });

    const chronoDates=[...sortedDates].reverse();
    const balanceMap={};
    chronoDates.forEach(d=>{
      balanceMap[d]=[];
      groups[d].forEach(e=>{
        runningBalance+=e.dir==='thu'?(e.amount||0):-(e.amount||0);
        balanceMap[d].push(runningBalance);
      });
    });

    sortedDates.forEach(d=>{
      const dayEntries=groups[d];
      const dayThu=dayEntries.filter(e=>e.dir==='thu').reduce((s,e)=>s+(e.amount||0),0);
      const dayChi=dayEntries.filter(e=>e.dir==='chi').reduce((s,e)=>s+(e.amount||0),0);
      h+=`<div class="ledger-day">
        <div class="ledger-day-header">
          <span>${formatDate(d)}</span>
          <div class="subtotal">
            <span style="color:var(--h5c-sage)">+${fmt(dayThu)}</span>
            <span style="margin:0 8px;color:var(--h5c-border-strong)">|</span>
            <span style="color:var(--h5c-terracotta)">−${fmt(dayChi)}</span>
          </div>
        </div>`;
      const bals=balanceMap[d]||[];
      dayEntries.forEach((e,i)=>{
        const bal=bals[i]||0;
        h+=`<div class="ledger-row">
          <span>${e.id||'—'}</span>
          <span style="font-weight:600">${e.desc||e.description||'—'}</span>
          <span class="method-badge">${METHOD_LABELS[e.method]||'—'}</span>
          <span class="${e.dir==='thu'?'amount-in':'amount-out'}">${e.dir==='thu'?'+':'−'}${fmt(e.amount)}</span>
          <span class="balance">${fmt(bal)}đ</span>
        </div>`;
      });
      h+=`</div>`;
    });
  }
  h+=`</div>`;
  return h;
}

function renderEntryTable(dir,entries){
  const catLabels=dir==='thu'?CAT_THU:CAT_CHI;
  let filtered=[...entries].sort((a,b)=>b.date>a.date?1:-1);
  let h=`<div class="card"><div class="cb-header">
    <h3 style="margin:0;font-size:16px">${dir==='thu'?'Phiếu thu':'Phiếu chi'}</h3>
    ${_can('cashbook.create')?`<button class="btn primary" onclick="openEntryModal('${dir}')">+ Tạo ${dir==='thu'?'phiếu thu':'phiếu chi'}</button>`:''}
  </div>`;
  if(!filtered.length){
    h+=`<div style="text-align:center;padding:40px;color:var(--h5c-text-secondary)"><p>Chưa có phiếu nào</p></div>`;
  }else{
    h+=`<div class="table-container"><table class="data-table"><thead><tr>
      <th>Mã</th><th>Ngày</th><th>Diễn giải</th><th>Danh mục</th><th>Số tiền</th><th>PT</th><th>Trạng thái</th><th>Người tạo</th>
      ${_can('cashbook.confirm')?'<th>Thao tác</th>':''}
    </tr></thead><tbody>`;
    filtered.forEach(e=>{
      h+=`<tr>
        <td><strong style="font-size:11px">${e.id}</strong></td>
        <td style="font-size:12px">${formatDate(e.date)}</td>
        <td style="font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.desc||e.description||'—'}</td>
        <td style="font-size:11px">${catLabels[e.category]||e.category||'—'}</td>
        <td style="font-weight:800;color:${dir==='thu'?'var(--h5c-sage)':'var(--h5c-terracotta)'}">${fmt(e.amount)}đ</td>
        <td><span class="method-badge">${METHOD_LABELS[e.method]||'—'}</span></td>
        <td><span class="status-badge ${e.status||'draft'}">${STATUS_LABELS[e.status||'draft']}</span></td>
        <td style="font-size:12px">${e.createdBy||'—'}</td>
        ${_can('cashbook.confirm')?`<td><div class="action-btns">
          ${e.status==='draft'?`<button class="action-btn confirm" title="Xác nhận" onclick="confirmEntry('${dir}','${e.id}')">✅</button>`:''}
          <button class="action-btn edit" title="Sửa" onclick="editEntry('${dir}','${e.id}')">✏️</button>
          <button class="action-btn delete" title="Hủy" onclick="cancelEntry('${dir}','${e.id}')">❌</button>
        </div></td>`:''}
      </tr>`;
    });
    h+=`</tbody></table></div>`;
  }
  h+=`</div>`;
  return h;
}

function renderBanks(){
  let h=`<div class="card"><div class="cb-header">
    <h3 style="margin:0;font-size:16px">Tài khoản ngân hàng</h3>
    ${_can('cashbook.create')?'<button class="btn primary" onclick="openBankModal()">+ Thêm TK</button>':''}
  </div>`;
  if(!BANKS.length){
    h+=`<div style="text-align:center;padding:40px;color:var(--h5c-text-secondary)"><div style="font-size:40px;margin-bottom:12px">🏦</div><p>Chưa có tài khoản ngân hàng nào</p></div>`;
  }else{
    BANKS.forEach(b=>{
      h+=`<div class="bank-card">
        <div class="info"><div class="name">${b.bankName}</div><div class="detail">${b.accountNumber} · ${b.accountName||''} · ${b.branch||''}</div></div>
        <div class="balance"><div class="label">Số dư</div><div class="amount">${fmt(b.currentBalance||0)}đ</div></div>
        <div class="action-btns" style="margin-left:16px">
          <button class="action-btn edit" onclick="editBank('${b.id}')">✏️</button>
          <button class="action-btn delete" onclick="deleteBank('${b.id}')">🗑️</button>
        </div>
      </div>`;
    });
  }
  h+=`</div>`;
  return h;
}

function renderChartsHTML(){
  return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
    <div class="card"><h3 style="font-size:14px;margin-bottom:16px">Thu vs Chi theo tháng</h3><div class="chart-container"><canvas id="monthChart"></canvas></div></div>
    <div class="card"><h3 style="font-size:14px;margin-bottom:16px">Cơ cấu chi</h3><div class="chart-container"><canvas id="catChart"></canvas></div></div>
    <div class="card" style="grid-column:1/-1"><h3 style="font-size:14px;margin-bottom:16px">Dòng tiền lũy kế</h3><div class="chart-container"><canvas id="flowChart"></canvas></div></div>
  </div>`;
}

function renderCharts(){
  Object.values(state.charts).forEach(c=>{if(c&&c.destroy)c.destroy();});
  state.charts={};
  const all=getAllEntries().filter(e=>e.status!=='cancelled');
  const now=new Date();
  const months=[];for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));}

  const mEl=document.getElementById('monthChart');
  if(mEl){
    const thuData=months.map(m=>all.filter(e=>e.dir==='thu'&&(e.date||'').startsWith(m)).reduce((s,e)=>s+(e.amount||0),0));
    const chiData=months.map(m=>all.filter(e=>e.dir==='chi'&&(e.date||'').startsWith(m)).reduce((s,e)=>s+(e.amount||0),0));
    state.charts.month=new Chart(mEl,{type:'bar',data:{
      labels:months.map(m=>{const[y,mm]=m.split('-');return mm+'/'+y;}),
      datasets:[{label:'Thu',data:thuData,backgroundColor:'#4A7A4D',borderRadius:4},{label:'Chi',data:chiData,backgroundColor:'#C44536',borderRadius:4}]
    },options:{responsive:true,maintainAspectRatio:false,scales:{y:{ticks:{callback:v=>fmtB(v)}}}}});
  }

  const cEl=document.getElementById('catChart');
  if(cEl){
    const catMap={};
    all.filter(e=>e.dir==='chi').forEach(e=>{const c=CAT_CHI[e.category]||e.category||'Khác';catMap[c]=(catMap[c]||0)+(e.amount||0);});
    state.charts.cat=new Chart(cEl,{type:'doughnut',data:{
      labels:Object.keys(catMap),datasets:[{data:Object.values(catMap),backgroundColor:['#C44536','#D4851A','#4A7FB5','#7B5EA7','#38261C','#2A8A7A']}]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11}}}}}});
  }

  const fEl=document.getElementById('flowChart');
  if(fEl){
    let cumulative=0;
    const sorted=[...all].sort((a,b)=>a.date>b.date?1:-1);
    const byDate={};sorted.forEach(e=>{cumulative+=e.dir==='thu'?(e.amount||0):-(e.amount||0);byDate[e.date]=cumulative;});
    const dates=Object.keys(byDate);
    state.charts.flow=new Chart(fEl,{type:'line',data:{
      labels:dates.map(d=>formatDate(d)),
      datasets:[{label:'Số dư lũy kế',data:dates.map(d=>byDate[d]),borderColor:'#8FC643',backgroundColor:'#8FC64320',fill:true,tension:.3,pointRadius:2}]
    },options:{responsive:true,maintainAspectRatio:false,scales:{y:{ticks:{callback:v=>fmtB(v)}}}}});
  }
}

// ════════════════════════════════════════════════════════════════
// ENTRY CRUD
// ════════════════════════════════════════════════════════════════
function openEntryModal(dir){
  document.getElementById('entryForm').reset();
  document.getElementById('entryId').value='';
  document.getElementById('entryDirection').value=dir;
  document.getElementById('entryModalTitle').textContent=dir==='thu'?'Tạo phiếu thu':'Tạo phiếu chi';
  document.getElementById('entryDate').value=new Date().toISOString().split('T')[0];
  const cats=dir==='thu'?CAT_THU:CAT_CHI;
  document.getElementById('entryCategory').innerHTML=Object.entries(cats).map(([k,v])=>`<option value="${k}">${v}</option>`).join('');
  document.getElementById('entryModal').classList.remove('hidden');
}

function editEntry(dir,id){
  const list=dir==='thu'?RECEIPTS:PAYMENTS_OUT;
  const e=list.find(x=>x.id===id);if(!e)return;
  openEntryModal(dir);
  document.getElementById('entryId').value=e.id;
  document.getElementById('entryDate').value=e.date||'';
  document.getElementById('entryAmount').value=e.amount||'';
  document.getElementById('entryCategory').value=e.category||'';
  document.getElementById('entryMethod').value=e.method||'tien_mat';
  document.getElementById('entryParty').value=e.party||'';
  document.getElementById('entryRef').value=e.reference||'';
  document.getElementById('entryDesc').value=e.desc||e.description||'';
  document.getElementById('entryNote').value=e.note||'';
}

function saveEntry(ev){
  ev.preventDefault();
  const dir=document.getElementById('entryDirection').value;
  const id=document.getElementById('entryId').value;
  const data={
    date:document.getElementById('entryDate').value,
    amount:parseInt(document.getElementById('entryAmount').value)||0,
    category:document.getElementById('entryCategory').value,
    method:document.getElementById('entryMethod').value,
    party:document.getElementById('entryParty').value.trim(),
    reference:document.getElementById('entryRef').value.trim(),
    desc:document.getElementById('entryDesc').value.trim(),
    note:document.getElementById('entryNote').value.trim()
  };
  const list=dir==='thu'?RECEIPTS:PAYMENTS_OUT;
  const storeKey=dir==='thu'?'cash_receipts':'cash_payments';
  if(id){
    const idx=list.findIndex(e=>e.id===id);
    if(idx!==-1)list[idx]={...list[idx],...data};
  }else{
    const prefix=dir==='thu'?'PT':'PC';
    let newId;do{newId=prefix+Date.now().toString(36).toUpperCase();}while(list.find(e=>e.id===newId));
    list.push({id:newId,...data,status:'draft',createdBy:state.user.name,createdAt:new Date().toISOString()});
  }
  H5C.set(storeKey,list);
  closeModal('entryModal');
  if(typeof showToast==='function')showToast(id?'Đã cập nhật':'Đã tạo '+( dir==='thu'?'phiếu thu':'phiếu chi'),'success');
  render();
}

function confirmEntry(dir,id){
  const list=dir==='thu'?RECEIPTS:PAYMENTS_OUT;
  const e=list.find(x=>x.id===id);if(!e)return;
  e.status='confirmed';e.approvedBy=state.user.name;e.approvedAt=new Date().toISOString();
  H5C.set(dir==='thu'?'cash_receipts':'cash_payments',list);
  if(typeof showToast==='function')showToast('Đã xác nhận','success');
  render();
}

function cancelEntry(dir,id){
  if(!confirm('Hủy phiếu này?'))return;
  const list=dir==='thu'?RECEIPTS:PAYMENTS_OUT;
  const e=list.find(x=>x.id===id);if(!e)return;
  e.status='cancelled';
  H5C.set(dir==='thu'?'cash_receipts':'cash_payments',list);render();
}

// ════════════════════════════════════════════════════════════════
// BANK CRUD
// ════════════════════════════════════════════════════════════════
function openBankModal(){
  document.getElementById('bankForm').reset();
  document.getElementById('bankId').value='';
  document.getElementById('bankModalTitle').textContent='Thêm tài khoản NH';
  document.getElementById('bankModal').classList.remove('hidden');
}
function editBank(id){
  const b=BANKS.find(x=>x.id===id);if(!b)return;
  openBankModal();
  document.getElementById('bankId').value=b.id;
  document.getElementById('bankModalTitle').textContent='Sửa tài khoản';
  document.getElementById('bankName').value=b.bankName||'';
  document.getElementById('bankNumber').value=b.accountNumber||'';
  document.getElementById('bankHolder').value=b.accountName||'';
  document.getElementById('bankBranch').value=b.branch||'';
  document.getElementById('bankBalance').value=b.currentBalance||0;
}
function saveBank(e){
  e.preventDefault();
  const id=document.getElementById('bankId').value;
  const data={
    bankName:document.getElementById('bankName').value.trim(),
    accountNumber:document.getElementById('bankNumber').value.trim(),
    accountName:document.getElementById('bankHolder').value.trim(),
    branch:document.getElementById('bankBranch').value.trim(),
    currentBalance:parseInt(document.getElementById('bankBalance').value)||0
  };
  if(id){const idx=BANKS.findIndex(b=>b.id===id);if(idx!==-1)BANKS[idx]={...BANKS[idx],...data};}
  else{let newId;do{newId='BK'+Date.now().toString(36).toUpperCase();}while(BANKS.find(b=>b.id===newId));BANKS.push({id:newId,...data});}
  H5C.set('bank_accounts',BANKS);closeModal('bankModal');
  if(typeof showToast==='function')showToast('Đã lưu tài khoản NH','success');
  render();
}
function deleteBank(id){
  if(!confirm('Xóa tài khoản này?'))return;
  BANKS=BANKS.filter(b=>b.id!==id);H5C.set('bank_accounts',BANKS);render();
}

function closeModal(id){document.getElementById(id).classList.add('hidden');}
