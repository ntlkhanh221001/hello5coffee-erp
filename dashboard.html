<head>

<!-- PASSWORD CHANGE MODAL -->

      <button class="modal-btn cancel" onclick="closePwdModal()">Hủy</button>

<script>
// ══════════════════════════════════════════════════════════════
// DATA & STATE
// ══════════════════════════════════════════════════════════════
const ACCOUNTS = {
  "admin@hello5coffee.com":   {pw:"Admin@123456", user:{id:"0",name:"Louis Nguyen", role:"C_LEVEL", roleLabel:"C-Level / Founder", pos:"Founder & CEO", first:false}},
  "manager@hello5coffee.com": {pw:"123456", user:{id:"1",name:"Nguyễn Thị Lan", role:"MANAGER", roleLabel:"Quản lý", pos:"Trưởng phòng HR", first:false}},
  "sales@hello5coffee.com":   {pw:"123456", user:{id:"3",name:"Lê Minh Khoa", role:"EMPLOYEE_SALES", roleLabel:"Nhân viên Sales", pos:"Chuyên viên Kinh doanh", first:false}},
  "finance@hello5coffee.com": {pw:"123456", user:{id:"4",name:"Phạm Thị Mai", role:"EMPLOYEE_FINANCE", roleLabel:"Nhân viên Kế toán", pos:"Kế toán viên", first:false}},
  "nv@hello5coffee.com":      {pw:"123456", user:{id:"2",name:"Đặng Văn Hùng", role:"EMPLOYEE_HR", roleLabel:"Nhân viên HR", pos:"Chuyên viên Nhân sự", first:true}},
};

const NAV_ITEMS = [
  {id:'dashboard', icon:'📊', vi:'Tổng quan', en:'Dashboard', roles:['all']},
  {id:'orders', icon:'📦', vi:'Đơn hàng', en:'Orders', roles:['C_LEVEL','MANAGER','EMPLOYEE_SALES']},
  {id:'leads', icon:'🎯', vi:'Lead / CRM', en:'Lead / CRM', roles:['C_LEVEL','MANAGER','EMPLOYEE_SALES']},
  {id:'expenses', icon:'💰', vi:'Chi phí', en:'Expenses', roles:['C_LEVEL','MANAGER','EMPLOYEE_FINANCE']},
  {id:'warehouse', icon:'🏭', vi:'Kho hàng', en:'Warehouse', roles:['C_LEVEL','MANAGER']},
  {id:'users', icon:'👥', vi:'Nhân viên', en:'Employees', roles:['C_LEVEL','MANAGER','EMPLOYEE_HR']},
  {id:'reports', icon:'📈', vi:'Báo cáo', en:'Reports', roles:['C_LEVEL','MANAGER']},
  {id:'announcements', icon:'📢', vi:'Thông báo', en:'Announcements', roles:['all']},
];

let state = {
  user: null,
  lang: 'vi',
  page: 'dashboard',
  charts: {},
  dateFrom: new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0],
  dateTo: new Date().toISOString().split('T')[0],
};

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
const fmt = (n) => new Intl.NumberFormat('vi-VN').format(Math.round(n||0));

function _isoToDisplay(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function _displayToIso(str) {
  if (!str) return null;
  const parts = str.replace(/-/g, '/').split('/');
  if (parts.length !== 3) return null;
  let [d, m, y] = parts.map(p => p.trim());
  if (y && y.length <= 2 && d.length === 4) [d, m, y] = [y, m, d];
  if (!d || !m || !y || y.length < 4) return null;
  const iso = `${y.padStart(4,'0')}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return null;
  return iso;
}
function _onDateFromChange(val) {
  const iso = _displayToIso(val);
  if (iso) { state.dateFrom = iso; renderPage(); }
  else { const el = document.getElementById('dateFromInput'); if (el) el.value = _isoToDisplay(state.dateFrom); }
}
function _onDateToChange(val) {
  const iso = _displayToIso(val);
  if (iso) { state.dateTo = iso; renderPage(); }
  else { const el = document.getElementById('dateToInput'); if (el) el.value = _isoToDisplay(state.dateTo); }
}

function _setDatePreset(preset) {
  const now = new Date();
  if (preset === 'thisMonth') {
    state.dateFrom = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
    state.dateTo = now.toISOString().split('T')[0];
  } else if (preset === 'lastMonth') {
    state.dateFrom = new Date(now.getFullYear(), now.getMonth()-1, 1).toISOString().split('T')[0];
    state.dateTo = new Date(now.getFullYear(), now.getMonth(), 0).toISOString().split('T')[0];
  } else if (preset === 'thisQuarter') {
    const qm = Math.floor(now.getMonth()/3)*3;
    state.dateFrom = new Date(now.getFullYear(), qm, 1).toISOString().split('T')[0];
    state.dateTo = now.toISOString().split('T')[0];
  } else if (preset === 'thisYear') {
    state.dateFrom = new Date(now.getFullYear(), 0, 1).toISOString().split('T')[0];
    state.dateTo = now.toISOString().split('T')[0];
  } else if (preset === 'all') {
    state.dateFrom = '2020-01-01';
    state.dateTo = '2099-12-31';
  }
  renderPage();
}

const fmtB = (n) => {
  if(n >= 1e9) return (n/1e9).toFixed(1) + ' tỷ';
  if(n >= 1e6) return (n/1e6).toFixed(0) + ' tr';
  return fmt(n);
};
const getInitials = (name) => name.split(' ').map(w=>w[0]).slice(-2).join('').toUpperCase();

// ══════════════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════════════
function _getAccountsForLogin() {
  try {
    const stored = localStorage.getItem('h5c_v1_accounts');
    if (stored) { const arr = JSON.parse(stored); if (arr && arr.length) return arr; }
  } catch(e) {}
  return Object.entries(ACCOUNTS).map(([email, v]) => ({
    email, pw: v.pw, role: v.user.role, name: v.user.name,
    pos: v.user.pos, empId: v.user.id
  }));
}

function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value;
  const errorEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errorEl.classList.remove('show');

  const h5cAccounts = _getAccountsForLogin();
  const h5cAcc = h5cAccounts.find(a => a.email.toLowerCase() === email);
  if (h5cAcc && h5cAcc.pw === password) {
    const userObj = {id: h5cAcc.empId || h5cAcc.email, name: h5cAcc.name, role: h5cAcc.role, pos: h5cAcc.pos, email: h5cAcc.email};
    btn.textContent = 'Đang đăng nhập...'; btn.disabled = true;
    setTimeout(() => {
      state.user = userObj; saveSession(userObj); showMain();
      btn.textContent = 'Đăng nhập'; btn.disabled = false;
    }, 400);
    return;
  }

  const acc = ACCOUNTS[email] || ACCOUNTS[document.getElementById('loginEmail').value.trim()];
  if (!acc || acc.pw !== password) { errorEl.classList.add('show'); return; }
  btn.textContent = 'Đang đăng nhập...'; btn.disabled = true;
  setTimeout(() => {
    state.user = acc.user; saveSession(state.user); showMain();
    btn.textContent = 'Đăng nhập'; btn.disabled = false;
  }, 400);
}

function handleLogout() {
  state.user = null; state.page = 'dashboard';
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('mainLayout').classList.add('hidden');
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
  Object.values(state.charts).forEach(c => c.destroy());
  state.charts = {};
}

// ══════════════════════════════════════════════════════════════
// NAVIGATION & LAYOUT
// ══════════════════════════════════════════════════════════════
const _DEPT_LABELS={kinh_doanh:'Kinh doanh',san_xuat:'Sản xuất',marketing:'Marketing',hr:'HR',ke_toan:'Kế toán',ban_gd:'Ban GĐ',it:'IT'};
function _getUserRoleDisplay(user){const emps=H5C.get('employees')||[];const emp=emps.find(e=>e.id===user.id||e.id===user.empId||(user.email&&e.email===user.email));if(emp){const dept=_DEPT_LABELS[emp.dept]||emp.dept||'';const pos=emp.position||user.pos||'';return dept&&pos?dept+' — '+pos:(dept||pos||user.pos||'');}return user.pos||'';}

function showMain() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('mainLayout').classList.remove('hidden');
  document.getElementById('userName').textContent = state.user.name;
  document.getElementById('userRole').textContent = _getUserRoleDisplay(state.user);
  document.getElementById('userAvatar').textContent = getInitials(state.user.name);
  renderNav();
  renderPage();
  if (state.user.first) showFirstLoginAlert();
}

function renderNav() {
  const nav = document.getElementById('sidebarNav');
  const role = state.user.role;
  const items = NAV_ITEMS.filter(item => item.roles.includes('all') || item.roles.includes(role));
  nav.innerHTML = items.map(item => `
    <div class="nav-item ${state.page === item.id ? 'active' : ''}" onclick="navigateTo('${item.id}')">
      <span class="icon">${item.icon}</span>
      <span>${state.lang === 'vi' ? item.vi : item.en}</span>
    </div>
  `).join('');
}

function navigateTo(page) {
  const pageMap = {
    dashboard:'dashboard.html', orders:'orders.html', leads:'leads.html',
    expenses:'expenses.html', warehouse:'warehouse.html', users:'users.html',
    reports:'reports.html', announcements:'announcements.html',
  };
  if (page === 'dashboard') { state.page = page; renderNav(); renderPage(); }
  else if (pageMap[page]) {
    if (!_canViewModule(page)) { showToast('Bạn không có quyền truy cập module này', 'warning'); return; }
    window.location.href = pageMap[page];
  } else { showToast('Module "' + page + '" đang được phát triển!', 'warning'); }
}

function setLang(lang) {
  state.lang = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
  renderNav(); renderPage();
}

// ══════════════════════════════════════════════════════════════
// PERMISSION ENGINE
// ══════════════════════════════════════════════════════════════
const _PERM_VIEW_MAP={dashboard:'dash.view',orders:'orders.view',leads:'leads.view',expenses:'expenses.view',warehouse:'wh.view_stock',users:'users.view',reports:'reports.view',announcements:'ann.view'};

const _ROLE_PERMS={
  MANAGER:{
    'dash.view':true,'dash.kpi_finance':true,'dash.ar_ap':true,'dash.top_sales':true,
    'orders.view':'all','orders.view_detail':true,'orders.view_cost':true,
    'orders.view_commission':'all','orders.view_history':true,'orders.view_cancelled':true,
    'orders.create':true,'orders.edit':'all','orders.update_progress':true,
    'orders.request_cancel':true,'orders.request_restore':true,
    'orders.approve_edit':true,'orders.approve_cancel':true,'orders.approve_restore':true,
    'orders.approve_request':true,'orders.submit_request':true,'orders.commission_config':true,
    'leads.view':'all','leads.create':true,'leads.edit':'all','leads.delete':true,'leads.convert_order':true,
    'expenses.view':'all','expenses.create':true,'expenses.edit':'all','expenses.approve':true,'expenses.reject':true,
    'wh.view_stock':true,'wh.view_lots':true,'wh.view_suppliers':true,'wh.view_po':true,
    'wh.create_sku':true,'wh.edit_sku':true,'wh.import':true,'wh.export':true,'wh.create_po':true,
    'users.view':true,'users.view_salary':true,'users.manage_attendance':true,'users.evaluate_kpi':true,
    'reports.view':true,'ann.view':true,'ann.create':true,'ann.approve':true,
  },
  EMPLOYEE_SALES:{
    'dash.view':true,'dash.top_sales':true,
    'orders.view':'own','orders.view_detail':true,'orders.view_commission':'own','orders.view_history':true,
    'orders.create':true,'orders.edit':'own','orders.update_progress':true,
    'orders.request_cancel':true,'orders.submit_request':true,
    'leads.view':'own','leads.create':true,'leads.edit':'own','leads.convert_order':true,

  },
  EMPLOYEE_FINANCE:{

    'expenses.view':'all','expenses.view_detail':true,'expenses.view_charts':true,

  },

    'dash.view':true,

  },
};

function _findAccount(session){
  if(!session) return null;
  try{
    const accounts=JSON.parse(localStorage.getItem('h5c_v1_accounts')||'[]');
    return accounts.find(a=>(a.email||'').toLowerCase()===(session.email||'').toLowerCase());
  }catch(e){return null;}
}
function _getPerms(acc){
  if(!acc) return {};
  if(acc.role==='C_LEVEL') return null;
  if(acc.permissions) return acc.permissions;
  return _ROLE_PERMS[acc.role]||{};
}
function _can(permId){
  try{
    const session=state.user; if(!session)return false;
    if(session.role==='C_LEVEL') return true;
    const acc=_findAccount(session);
    if(!acc) return false;
    if(acc.role==='C_LEVEL') return true;
    const perms=_getPerms(acc);
    if(!perms) return true;
    const val=perms[permId];
    return val===true||val==='all'||val==='own';
  }catch(e){return state.user&&state.user.role==='C_LEVEL';}
}
function _canScope(permId){
  try{
    const session=state.user; if(!session)return 'none';
    if(session.role==='C_LEVEL') return 'all';
    const acc=_findAccount(session);
    if(!acc) return 'none';
    if(acc.role==='C_LEVEL') return 'all';
    const perms=_getPerms(acc);
    if(!perms) return 'all';
    const val=perms[permId];
    if(val===true||val==='all') return 'all';
    if(val==='own') return 'own';
    return 'none';
  }catch(e){return 'all';}
}
function _canViewModule(moduleId){
  const permId=_PERM_VIEW_MAP[moduleId];
  if(!permId) return true;
  return _can(permId);
}

function canSeeKpis() { return _can('dash.kpi_finance'); }
function isCLevel() { return state.user.role === 'C_LEVEL'; }

// ══════════════════════════════════════════════════════════════
// PAGE RENDERING
// ══════════════════════════════════════════════════════════════
function renderPage() {
  const title = NAV_ITEMS.find(i => i.id === state.page);
  document.getElementById('pageTitle').textContent = title ? (state.lang === 'vi' ? title.vi : title.en) : '';
  Object.values(state.charts).forEach(c => c.destroy());
  state.charts = {};
  if (state.page === 'dashboard') renderDashboard();
  else renderComingSoon();

function showFirstLoginAlert() {
  const content = document.getElementById('pageContent');
  const alert = document.createElement('div');
  alert.className = 'alert-banner';
  alert.id = 'firstLoginAlert';
  alert.innerHTML = `
    <span class="icon">⚠️</span>
    <span class="text">${state.lang === 'vi' ? 'Lần đầu đăng nhập — vui lòng đổi mật khẩu!' : 'First login — please change your password!'}</span>
    <button class="btn" onclick="openPwdModal()">${state.lang === 'vi' ? 'Đổi mật khẩu' : 'Change Password'}</button>
  `;
  content.insertBefore(alert, content.firstChild);

// ══════════════════════════════════════════════════════════════
// COMPUTE KPIs
// ══════════════════════════════════════════════════════════════
// Helper: trả về data đã filter theo scope của user hiện tại
function _dashScopedData() {
  const user = state.user;
  const oScope = _canScope('orders.view');
  const eScope = _canScope('expenses.view');
  const lScope = _canScope('leads.view');
  const allOrders   = H5C.get('orders')   || [];
  const allExpenses = H5C.get('expenses') || [];
  const allLeads    = H5C.get('leads')    || [];
  return {
    orders:   (oScope==='own'&&user) ? allOrders.filter(o=>o.sales===user.name)   : allOrders,
    expenses: (eScope==='own'&&user) ? allExpenses.filter(e=>e.creator===user.name) : allExpenses,
    leads:    (lScope==='own'&&user) ? allLeads.filter(l=>l.sales===user.name)    : allLeads,
  };
}

function _calcOrderCOGS(o) {
  const productCogs = (o.products||[]).reduce((s,p) => s + ((p.qty||0) * (p.costPerUnit||0)), 0);
  const extraCogs = (o.costShipping||0) + (o.costOther||[]).reduce((s,c) => s + (c.amount||0), 0);
  return productCogs + extraCogs;
}

function computeRealKPIs(dateFrom, dateTo) {
  const from = dateFrom ? new Date(dateFrom) : null;
  const to = dateTo ? new Date(dateTo + 'T23:59:59') : null;
  const inRange = (d) => {
    if (!d) return true;
    const dt = new Date(d);
    if (from && dt < from) return false;
    if (to && dt > to) return false;
    return true;
  };

  const {orders: allOrders, expenses: allExpenses, leads: allLeads} = _dashScopedData();
  const employees   = H5C.get('employees') || [];
  const lots        = H5C.get('lots')      || [];

  const orders   = allOrders.filter(o => o.status !== 'cancelled' && inRange(o.createdAt || o.date));
  const expenses = allExpenses.filter(e => e.status !== 'tu_choi' && inRange(e.date));
  const leads    = allLeads.filter(l => inRange(l.startDate));

  const revenue       = orders.reduce((s,o) => s + (o.total||0), 0);
  const totalCOGS     = orders.reduce((s,o) => s + _calcOrderCOGS(o), 0);
  const grossProfit   = revenue - totalCOGS;
  const approvedExp   = expenses.reduce((s,e) => s + (e.amount||0), 0);
  const netProfit     = grossProfit - approvedExp;
  const pendingOrders = orders.filter(o => ['confirmed','producing','produced','shipping'].includes(o.status));
  const pendingValue  = pendingOrders.reduce((s,o) => s + (o.total||0), 0);
  const headcount     = employees.filter(e => e.status !== 'inactive').length;
  const ar = allOrders.filter(o => o.status==='completed' && o.payment!=='paid')
    .reduce((s,o) => s + ((o.total||0) - (o.paidAmount||0)), 0);
  const ap = allExpenses.filter(e => e.status !== 'tu_choi' && e.payment !== 'da_thanh_toan' && e.payment !== 'paid')
    .reduce((s,e) => s + (e.amount||0), 0);
  const newLeads      = leads.filter(l => l.pipeline==='lead').length;
  const closedLeads   = leads.filter(l => ['chot_don','quay_lai'].includes(l.pipeline)).length;
  const convRate      = leads.length ? Math.round(closedLeads/leads.length*100) : 0;
  const skus = H5C.get('skus') || [];
  const stockValue = lots.reduce((s,lot) => {
    const sku = skus.find(x => x.id===lot.skuId);
    return s + (lot.qty||0) * (sku?sku.suggestedPrice||0:0);
  }, 0);

  const cashIn = allOrders.filter(o => o.status !== 'cancelled' && inRange(o.createdAt || o.date))
    .reduce((s,o) => {
      if (o.payment === 'paid') return s + (o.total||0);
      if (o.payment === 'partial') return s + (o.paidAmount||0);
      return s;
    }, 0);
  const cashOut = allExpenses.filter(e => e.status !== 'tu_choi' && inRange(e.date))
    .reduce((s,e) => {
      if (e.payment === 'da_thanh_toan' || e.payment === 'paid') return s + (e.amount||0);
      if (e.payment === 'mot_phan') return s + Math.round((e.amount||0) * 0.5);
      return s;
    }, 0);
  const cashFlow = cashIn - cashOut;
  const dashConfig = H5C.get('dash_config') || {};
  const target = dashConfig.revenueTarget || 3000000000;

  return {
    revenue:      { amount: revenue, target: target, vs_target_pct: target ? Math.round(revenue/target*100) : 0 },
    gross_profit: { amount: grossProfit, margin_pct: revenue ? Math.round(grossProfit/revenue*100) : 0 },
    net_profit:   { amount: netProfit },
    opex:         { amount: approvedExp },
    cash_flow:    { amount: cashFlow },
    ar:           { total: ar },
    ap:           { total: ap },
    orders:       { count: pendingOrders.length, value: pendingValue },
    headcount:    headcount,
    leads:        { count: newLeads, conversion_rate: convRate },
    stock_value:  stockValue,
  };
}

function _dashDateFilter(dateField) {
  const from = state.dateFrom ? new Date(state.dateFrom) : null;
  const to = state.dateTo ? new Date(state.dateTo + 'T23:59:59') : null;
  return function(item) {
    const d = item[dateField]; if (!d) return true;
    const dt = new Date(d);
    if (from && dt < from) return false;
    if (to && dt > to) return false;
    return true;
  };
}

function _buildMonthlyData() {
  const {orders: _o, expenses: _e} = _dashScopedData();
  const orders   = _o.filter(o => o.status !== 'cancelled');
  const expenses = _e.filter(e => e.status !== 'tu_choi');
  const months = [];
  const now = new Date();
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    const label = String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getFullYear()).slice(2);
    months.push({key, label, revenue:0, cogs:0, expense:0});
  }
  orders.forEach(o => {
    const dt = o.createdAt || o.date || ''; if (!dt) return;
    const k = dt.slice(0,7);
    const m = months.find(x => x.key === k);
    if (m) { m.revenue += (o.total || 0); m.cogs += _calcOrderCOGS(o); }
  });
  expenses.forEach(e => {
    const dt = e.date || ''; if (!dt) return;
    const k = dt.slice(0,7);
    const m = months.find(x => x.key === k);
    if (m) m.expense += (e.amount || 0);
  });
  return months;
}

function renderAgingBars() {
  const {orders, expenses} = _dashScopedData();
  const now = new Date();

  // Load leads to get credit terms (creditDays) per customer
  const allLeads = H5C.get('leads') || [];
  const _leadCreditDays = (order) => {
    const lead = allLeads.find(l => l.company === order.customer || l.phone === order.phone);
    return lead ? (lead.creditDays || 0) : 0;
  };

  const arOrders = orders.filter(o => (o.status==='completed'||o.status==='shipping'||o.status==='produced') && o.payment!=='paid' && o.payment!=='da_thanh_toan');
  const arBuckets = {'0_30':0,'31_60':0,'61_90':0,'over_90':0};
  arOrders.forEach(o => {
    const amt = Math.max(0, (o.total||0) - (o.paidAmount||0));
    const creditDays = _leadCreditDays(o);
    const orderDate = new Date(o.createdAt || o.date || now);
    // dueDate = orderDate + creditDays (if set), else dueDate = orderDate
    const dueDate = creditDays > 0 ? new Date(orderDate.getTime() + creditDays*86400000) : orderDate;
    const daysOverdue = Math.floor((now - dueDate) / 86400000);
    if (daysOverdue <= 0) arBuckets['0_30'] += amt; // not yet due → current bucket
    else if (daysOverdue <= 30) arBuckets['0_30'] += amt;
    else if (daysOverdue <= 60) arBuckets['31_60'] += amt;
    else if (daysOverdue <= 90) arBuckets['61_90'] += amt;
    else arBuckets['over_90'] += amt;
  });
  const arTotal = Object.values(arBuckets).reduce((a,b)=>a+b,0);

  const apExpenses = expenses.filter(e => e.status !== 'tu_choi' && e.payment !== 'paid' && e.payment !== 'da_thanh_toan');
  const apBuckets = {'0_30':0,'31_60':0,'61_90':0,'over_90':0};
  apExpenses.forEach(e => {
    const amt = e.amount || 0;
    const days = Math.floor((now - new Date(e.date || now)) / (1000*60*60*24));
    if (days <= 30) apBuckets['0_30'] += amt;
    else if (days <= 60) apBuckets['31_60'] += amt;
    else if (days <= 90) apBuckets['61_90'] += amt;
    else apBuckets['over_90'] += amt;
  });
  const apTotal = Object.values(apBuckets).reduce((a,b)=>a+b,0);

  const arData = {total:arTotal||0, '0_30':arBuckets['0_30'], '31_60':arBuckets['31_60'], '61_90':arBuckets['61_90'], 'over_90':arBuckets['over_90']};
  const apData = {total:apTotal||0, '0_30':apBuckets['0_30'], '31_60':apBuckets['31_60'], '61_90':apBuckets['61_90'], 'over_90':apBuckets['over_90']};

  const colors = { '0_30': PALETTE.sage, '31_60': PALETTE.amber, '61_90': PALETTE.terracotta, 'over_90': PALETTE.plum };
  // AR: labels reflect overdue age; AP: labels are time since expense
  const arLabels = { '0_30': 'Chưa / ≤30 ngày', '31_60': 'Quá hạn 31–60 ngày', '61_90': 'Quá hạn 61–90 ngày', 'over_90': 'Quá hạn >90 ngày' };
  const apLabels = { '0_30': '0–30 ngày', '31_60': '31–60 ngày', '61_90': '61–90 ngày', 'over_90': '>90 ngày' };

  [{type:'ar', data:arData, labels:arLabels}, {type:'ap', data:apData, labels:apLabels}].forEach(({type, data, labels}) => {
    const container = document.getElementById(type + 'Aging'); if (!container) return;
    const total = data.total || 1;
    if (data.total === 0) { container.innerHTML = '<div style="text-align:center;padding:20px;font-size:12px;color:var(--h5c-text-muted)">Không có công nợ</div>'; return; }
    let barHtml = '<div class="aging-bar">';
    let legendHtml = '<div class="aging-legend">';
    ['0_30', '31_60', '61_90', 'over_90'].forEach(key => {
      const val = data[key] || 0;
      if (!val) return;
      const pct = (val / total * 100).toFixed(1);
      barHtml += `<div class="aging-segment" style="width:${pct}%;background:${colors[key]}" title="${labels[key]}: ${fmtB(val)}">${pct > 8 ? pct+'%' : ''}</div>`;
      legendHtml += `<div class="aging-legend-item"><div class="aging-dot" style="background:${colors[key]}"></div>${labels[key]}: <strong>${fmtB(val)}</strong></div>`;
    });
    barHtml += '</div>';
    legendHtml += '</div>';
    container.innerHTML = barHtml + legendHtml;
  });
}

  document.getElementById('pwdNew').value = '';
  document.getElementById('pwdConfirm').value = '';
  document.getElementById('pwdError').classList.add('hidden');
}
function changePwd() {
  const cur = document.getElementById('pwdCurrent').value;
  const newPwd = document.getElementById('pwdNew').value;
  const confirmPwd = document.getElementById('pwdConfirm').value;
  const errorEl = document.getElementById('pwdError');
  if (!cur || !newPwd || !confirmPwd) { errorEl.textContent = 'Vui lòng điền đầy đủ'; errorEl.classList.remove('hidden'); return; }
  if (newPwd !== confirmPwd) { errorEl.textContent = 'Mật khẩu mới không khớp'; errorEl.classList.remove('hidden'); return; }
  if (newPwd.length < 8) { errorEl.textContent = 'Mật khẩu mới tối thiểu 8 ký tự'; errorEl.classList.remove('hidden'); return; }
  const accounts = getAccounts();
  const acc = accounts.find(a => (a.email||'').toLowerCase() === (state.user.email||'').toLowerCase());
  if (!acc) { errorEl.textContent = 'Không tìm thấy tài khoản'; errorEl.classList.remove('hidden'); return; }
  if (acc.pw !== cur) { errorEl.textContent = 'Mật khẩu hiện tại không đúng'; errorEl.classList.remove('hidden'); return; }
  acc.pw = newPwd;
  H5C.set('accounts', accounts);
  state.user.first = false;
  const alert = document.getElementById('firstLoginAlert');
  if (alert) alert.remove();
  closePwdModal();
  if (typeof showToast === 'function') showToast('Đổi mật khẩu thành công!', 'success');
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loginPassword').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
  document.getElementById('loginEmail').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('loginPassword').focus(); });
});

// ═══════════════════════════════════════════════════════════
// H5C SHARED DATA STORE
// ═══════════════════════════════════════════════════════════
const H5C = {
  _k: k => 'h5c_v1_' + k,
  get(k) { try { const v = localStorage.getItem(this._k(k)); return v ? JSON.parse(v) : null; } catch(e) { return null; } },
  set(k, v) { try { localStorage.setItem(this._k(k), JSON.stringify(v)); } catch(e) {} },
  init(k, def) { const v = this.get(k); if (v !== null) return v; this.set(k, def); return def; },
  clear(k) { localStorage.removeItem(this._k(k)); },
  mergeEmployees(arr) { const stored = this.get('employees'); if (stored && stored.length) { arr.splice(0, arr.length, ...stored); } },
  salesList() { const emps = this.get('employees') || []; return emps.filter(e => e.status !== 'inactive').map(e => e.name); },
  productsList() {
    const skus = this.get('skus') || []; if (!skus.length) return null;
    const UNIT_MAP = {kg:'Kg',hop:'Hộp',chiec:'Chiếc',tui:'Túi',stick:'Stick',cont:'Cont'};
    return skus.map(s => ({ id: s.id, name: s.name, unit: UNIT_MAP[s.unit] || s.unit || 'Cái', price: s.suggestedPrice || 0 }));
  }
};

const SESSION_KEY = 'h5c_erp_user';
function saveSession(user) { localStorage.setItem(SESSION_KEY, JSON.stringify(user)); }
function loadSession() { try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch(e) { return null; } }
function clearSession() { localStorage.removeItem(SESSION_KEY); }

window.addEventListener('DOMContentLoaded', function() {
  const saved = loadSession();
  if (saved) { state.user = saved; showMain(); }
});
